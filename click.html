<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Speed Rush</title>
    <script src="translator.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; --gold: #D4AF37; --gold-light: #FFD700; 
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); 
            --green: #00ff88; --red: #ff4b4b; 
        }

        html { overflow-y: scroll; scroll-behavior: smooth; height: 100%; background: var(--bg); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { 
            background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            min-height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden; 
            padding-bottom: 90px; 
        }

        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }

        /* --- ТАБ-БАР (ПРЕМИУМ ДИЗАЙН С НЕОНОМ) --- */
        .tab-bar-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: linear-gradient(to top, var(--bg) 80%, transparent); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 25px; z-index: 1000; pointer-events: none; }
        .tab-bar { pointer-events: auto; width: 95%; max-width: 400px; height: 65px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.8); transition: opacity 0.5s ease; }
        .tab-bar.ready { opacity: 1; }
        
        .tab-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #555; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex: 1; position: relative; }
        .tab-icon { font-size: 20px; margin-bottom: 4px; transition: 0.3s; filter: grayscale(100%) opacity(0.6); transform: scale(0.9); z-index: 2; }
        .tab-label { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; z-index: 2; }
        
        /* Активная вкладка */
        .tab-item.active { color: var(--gold); transform: translateY(-4px); }
        .tab-item.active .tab-icon { filter: grayscale(0%) opacity(1) drop-shadow(0 4px 6px rgba(212, 175, 55, 0.5)); transform: scale(1.15); }
        .tab-item.active .tab-label { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        
        /* Неоновое свечение позади активной иконки */
        .tab-item.active::before {
            content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            width: 45px; height: 45px; background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; animation: pulseTab 2s infinite alternate;
        }

        @keyframes pulseTab { 0% { opacity: 0.5; transform: translateX(-50%) scale(0.9); } 100% { opacity: 1; transform: translateX(-50%) scale(1.2); } }

        /* --- КОНТЕНТ --- */
        main { flex: 1; width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; opacity: 0; transform: translateY(15px); transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); margin-top: 10px; visibility: hidden; }
        main.ready { opacity: 1; transform: translateY(0); visibility: visible; }

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { display: inline-flex; align-items: center; gap: 5px; color: #888; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; transition: 0.2s; cursor: pointer; }
        .back-btn:active { color: var(--gold); }
        .lvl-badge { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; display: flex; gap: 6px; align-items: center;}

        /* --- ИНФО ПАНЕЛЬ --- */
        .info-panel { display: flex; justify-content: space-between; align-items: center; background: var(--glass); padding: 15px 20px; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); margin-bottom: 20px; position: relative; overflow: hidden; }
        .stat-box { display: flex; flex-direction: column; align-items: center; z-index: 2; }
        .stat-label { font-size: 9px; color: #888; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .stat-val { font-size: 20px; font-weight: 900; color: #fff; transition: 0.2s; }
        #combo-val { color: var(--gold-light); }
        .combo-pulse { transform: scale(1.3); text-shadow: 0 0 15px var(--gold); }
        
        .score-goal-text { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); font-size: 7px; color: rgba(255,255,255,0.3); font-weight: 800; letter-spacing: 2px; }

        /* --- ТАЙМЕР --- */
        .timer-container { margin-bottom: 25px; position: relative; }
        .timer-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid var(--glass-border); overflow: hidden; }
        .timer-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold-light)); width: 100%; transition: width 1s linear; }
        .timer-fill.danger { background: linear-gradient(90deg, #ff9900, var(--red)); }
        .time-text { position: absolute; right: 0; top: -20px; font-size: 12px; font-weight: 900; color: var(--gold); }

        /* --- ИГРОВАЯ ЗОНА --- */
        .target-card { 
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), var(--glass)); 
            border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px 10px; 
            text-align: center; margin-bottom: 20px; backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; min-height: 120px;
        }
        .target-word { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 1px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        /* --- СЕТКА КНОПОК --- */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-btn {
            background: rgba(15,15,15,0.8); border: 1px solid var(--glass-border); border-radius: 15px;
            padding: 20px 10px; font-size: 13px; font-weight: 800; color: #ccc; text-transform: uppercase;
            cursor: pointer; transition: 0.15s; backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; text-align: center; min-height: 70px;
        }
        .option-btn:active { transform: scale(0.95); background: rgba(212, 175, 55, 0.1); border-color: var(--gold); color: #fff; }
        
        .option-btn.correct { border-color: var(--green); background: rgba(0, 255, 136, 0.1); color: var(--green); pointer-events: none;}
        .option-btn.wrong { border-color: var(--red); background: rgba(255, 75, 75, 0.15); color: var(--red); animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* --- ОВЕРЛЕЙ КОНЦА ИГРЫ --- */
        .end-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: 0.4s;
        }
        .end-screen.show { opacity: 1; pointer-events: auto; }
        .end-title { font-size: 28px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
        .end-title.success { color: var(--green); text-shadow: 0 0 20px rgba(0, 255, 136, 0.5); }
        .end-title.fail { color: var(--red); text-shadow: 0 0 20px rgba(255, 75, 75, 0.5); }
        
        .end-stats { display: flex; gap: 30px; margin-bottom: 40px; }
        .end-stat { text-align: center; }
        .end-stat span { display: block; font-size: 10px; color: #888; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .end-stat strong { font-size: 24px; color: #fff; font-weight: 900; }
        
        .end-btn {
            background: linear-gradient(45deg, var(--gold), var(--gold-light)); border: none; border-radius: 20px;
            padding: 15px 40px; font-size: 14px; font-weight: 900; color: #000; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); transition: 0.2s;
        }
        .end-btn:active { transform: scale(0.95); }

        /* ЭКРАН СТАРТА */
        .start-screen {
             position: absolute; inset: 0; background: var(--bg); z-index: 100;
             display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.4s;
        }
        .start-screen.hide { opacity: 0; pointer-events: none; }
        .start-btn {
            background: transparent; border: 2px solid var(--gold); border-radius: 20px;
            padding: 15px 40px; font-size: 16px; font-weight: 900; color: var(--gold); text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: 0.2s; box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }
        .start-btn:active { background: var(--gold); color: #000; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="tab-bar-container">
    <div class="tab-bar" id="tab-bar">
        <a href="javascript:void(0)" onclick="fadeNavigate('main.html')" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span class="tab-label" data-i18n="tab_home">Главная</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('mode.html')" class="tab-item active">
            <span class="tab-icon">🎮</span>
            <span class="tab-label" data-i18n="tab_play">Играть</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('profile.html')" class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-label" data-i18n="tab_profile">Профиль</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('quests.html')" class="tab-item">
            <span class="tab-icon">📜</span>
            <span class="tab-label" data-i18n="tab_quests">Квесты</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('settings.html')" class="tab-item">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_settings">Настройки</span>
        </a>
    </div>
</div>

<main id="main-content" style="position: relative;">
    
    <div class="start-screen" id="start-screen">
        <h2 data-i18n="speed_rush_title" style="font-weight: 900; color: #fff; margin-bottom: 10px; font-size: 24px;">SPEED RUSH</h2>
        <p data-i18n="speed_rush_desc" style="color: #888; font-size: 10px; font-weight: 700; text-align: center; margin-bottom: 40px; max-width: 250px; line-height: 1.5;">Находи переводы как можно быстрее!</p>
        <button class="start-btn" onclick="startGame()" data-i18n="start_btn">СТАРТ</button>
    </div>

    <div class="top-nav">
        <div onclick="fadeNavigate('mode.html')" class="back-btn">
            <span>◀</span> <span data-i18n="back_to_modes">НАЗАД</span>
        </div>
        <div class="lvl-badge">
            <span data-i18n="rush_round_label">РАУНД</span> <span id="rush-lvl-display">1</span>
        </div>
    </div>

    <div class="info-panel">
        <div class="stat-box">
            <span class="stat-label" data-i18n="stat_score">ОЧКИ</span>
            <span class="stat-val" id="score-val">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label" data-i18n="stat_combo">КОМБО</span>
            <span class="stat-val" id="combo-val">x1</span>
        </div>
        <div class="score-goal-text" data-i18n="rush_score_needed">НУЖНО 400 ОЧКОВ</div>
    </div>

    <div class="timer-container">
        <div class="time-text" id="time-text">60s</div>
        <div class="timer-bg"><div class="timer-fill" id="timer-fill"></div></div>
    </div>

    <div class="target-card">
        <div class="target-word" id="target-word" data-i18n="loading_word">Загрузка...</div>
    </div>

    <div class="options-grid" id="options-grid">
        <!-- Кнопки генерируются JS -->
    </div>
</main>

<div class="end-screen" id="end-screen">
    <div class="end-title" id="end-title">...</div>
    <div class="end-stats">
        <div class="end-stat"><span data-i18n="stat_score">ОЧКИ</span><strong id="final-score">0</strong></div>
        <div class="end-stat"><span data-i18n="max_combo">МАКС. КОМБО</span><strong id="final-combo">x1</strong></div>
        <div class="end-stat"><span data-i18n="exp_plus">ПОЛУЧЕНО EXP</span><strong id="final-exp" style="color: var(--gold);">0</strong></div>
    </div>
    <button class="end-btn" id="end-action-btn" onclick="saveAndExit()">...</button>
</div>

<script>
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = localStorage.getItem('wt_user');
    if (!user) window.location.href = 'index.html';

    const appLang = localStorage.getItem('appLang') || 'rus';

    let rushRound = 1;
    let pool = [];         // Все слова для раунда (включая перенесенные)
    let activeDeck = [];   // Слова, на которые еще не дан правильный ответ

    let currentWord = null;
    let score = 0;
    let combo = 1;
    let maxCombo = 1;
    let timeLeft = 60;
    let timerInterval = null;
    let isPlaying = false;
    let isProcessing = false;
    let isRoundPassed = false;

    function fadeNavigate(url) {
        if (window.location.href.includes(url)) return;
        const main = document.querySelector('main');
        main.style.opacity = '0';
        main.style.transform = 'translateY(15px)';
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        setTimeout(() => { window.location.href = url; }, 400); 
    }

    async function loadWords() {
        try {
            if (!window.translations) {
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            // Узнаем текущий раунд игрока из базы
            let { data: prog } = await sb.from('user_progress').select('rush_level').eq('username', user).single();
            if (prog && prog.rush_level) {
                rushRound = prog.rush_level;
            }
            document.getElementById('rush-lvl-display').innerText = rushRound;

            // Высчитываем диапазон (по 5 уровней на каждый раунд)
            let minLevel = (rushRound - 1) * 5 + 1;
            let maxLevel = rushRound * 5;

            // Если игрок дошел до раунда 61 (уровни 300+)
            if (minLevel > 300) {
                minLevel = Math.floor(Math.random() * 295) + 1;
                maxLevel = minLevel + 4;
            }

            // Грузим слова для этого диапазона уровней
            const { data: words } = await sb.from('words')
                .select(`id, level, eng, ${appLang}`)
                .gte('level', minLevel)
                .lte('level', maxLevel)
                .limit(150);

            if(words && words.length >= 4) {
                pool = [...words];

                // Проверяем, есть ли неразгаданные слова с прошлого раунда
                let carryover = JSON.parse(localStorage.getItem('wt_rush_carryover')) || [];
                carryover.forEach(cw => {
                    if(!pool.find(w => w.id === cw.id)) {
                        pool.push(cw);
                    }
                });

                requestAnimationFrame(() => {
                    document.getElementById('main-content').classList.add('ready');
                });
            } else {
                document.getElementById('target-word').innerText = window.translations ? window.translations['loading_words_error'] : "Слова закончились!";
            }
        } catch(e) {
            console.error(e);
        }
    }

    function startGame() {
        document.getElementById('start-screen').classList.add('hide');
        score = 0;
        combo = 1;
        maxCombo = 1;
        timeLeft = 60;
        isPlaying = true;
        
        // Заполняем колоду всеми доступными словами
        activeDeck = [...pool];

        updateUI();
        nextTask();
        
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if(timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function nextTask() {
        if(!isPlaying) return;
        isProcessing = false;
        
        // Если умная колода опустела до конца времени — восполняем (бесконечный фарм)
        if (activeDeck.length === 0) {
            activeDeck = [...pool];
        }

        // Берем случайное слово из оставшихся в КОЛОДЕ
        let randomIndex = Math.floor(Math.random() * activeDeck.length);
        currentWord = activeDeck[randomIndex];
        document.getElementById('target-word').innerText = currentWord.eng;

        // Варианты ответов берем из всего ПУЛА (чтобы запутать)
        let options = [currentWord];
        while(options.length < 4) {
            let randomWord = pool[Math.floor(Math.random() * pool.length)];
            if(!options.find(w => w.id === randomWord.id)) {
                options.push(randomWord);
            }
        }

        options.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerText = opt[appLang]; 
            btn.onclick = () => checkAnswer(opt.id, btn);
            grid.appendChild(btn);
        });
    }

    function checkAnswer(selectedId, btnElement) {
        if(!isPlaying || isProcessing) return;
        isProcessing = true;

        if(selectedId === currentWord.id) {
            if(window.navigator.vibrate) window.navigator.vibrate(50);
            btnElement.classList.add('correct');
            
            activeDeck = activeDeck.filter(w => w.id !== currentWord.id);

            score += (10 * combo);
            combo++;
            if(combo > maxCombo) maxCombo = combo;
            
            animateCombo();
            updateUI();
            setTimeout(nextTask, 300);

        } else {
            if(window.navigator.vibrate) window.navigator.vibrate([50, 80, 50]);
            btnElement.classList.add('wrong');
            
            combo = 1;
            timeLeft -= 2; 
            updateUI();
            updateTimerUI();
            
            setTimeout(() => {
                btnElement.classList.remove('wrong');
                isProcessing = false;
            }, 400);
        }
    }

    function animateCombo() {
        const comboEl = document.getElementById('combo-val');
        comboEl.classList.add('combo-pulse');
        setTimeout(() => comboEl.classList.remove('combo-pulse'), 150);
    }

    function updateUI() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('combo-val').innerText = `x${combo}`;
        
        const comboEl = document.getElementById('combo-val');
        if(combo >= 10) comboEl.style.color = 'var(--red)';
        else if(combo >= 5) comboEl.style.color = 'var(--green)';
        else comboEl.style.color = 'var(--gold-light)';
    }

    function updateTimerUI() {
        if(timeLeft < 0) timeLeft = 0;
        document.getElementById('time-text').innerText = `${timeLeft}s`;
        const fill = document.getElementById('timer-fill');
        fill.style.width = `${(timeLeft / 60) * 100}%`;
        
        if(timeLeft <= 10) fill.classList.add('danger');
        else fill.classList.remove('danger');
    }

    function endGame() {
        isPlaying = false;
        clearInterval(timerInterval);
        if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
        
        const earnedExp = Math.floor(score / 50);

        document.getElementById('final-score').innerText = score;
        document.getElementById('final-combo').innerText = `x${maxCombo}`;
        document.getElementById('final-exp').innerText = earnedExp;
        
        const titleEl = document.getElementById('end-title');
        const btnEl = document.getElementById('end-action-btn');

        // Проверка победы (400 очков)
        isRoundPassed = score >= 400;

        if (isRoundPassed) {
            titleEl.innerText = window.translations?.['rush_passed_title'] || 'РАУНД ПРОЙДЕН!';
            titleEl.className = 'end-title success';
            btnEl.innerText = window.translations?.['rush_next_round_btn'] || 'СЛЕДУЮЩИЙ РАУНД';
        } else {
            titleEl.innerText = window.translations?.['rush_failed_title'] || 'ВРЕМЯ ВЫШЛО!';
            titleEl.className = 'end-title fail';
            btnEl.innerText = window.translations?.['rush_retry_btn'] || 'ПОПРОБОВАТЬ СНОВА';
        }
        
        document.getElementById('end-screen').classList.add('show');
    }

    async function saveAndExit() {
        const btn = document.getElementById('end-action-btn');
        btn.innerText = window.translations ? window.translations['saving_btn'] : "СОХРАНЕНИЕ...";
        btn.style.opacity = '0.5';
        btn.style.pointerEvents = 'none';

        const earnedExp = Math.floor(score / 50);
        const pairsFound = Math.floor(score / 10);

        try {
            let { data: stats } = await sb.from('user_progress').select('global_exp, global_level, total_pairs_found, current_streak, last_played_date').eq('username', user).single();
            
            let gExp = (stats?.global_exp || 0) + earnedExp; 
            let gLvl = stats?.global_level || 1;
            let newTotalPairs = (stats?.total_pairs_found || 0) + pairsFound;

            let neededExp = gLvl * 10;
            if (gExp >= neededExp) {
                gExp -= neededExp;
                gLvl += 1;
            }

            // --- ДВИГАТЕЛЬ СЕРИИ (ОГОНЬКА) ---
            const todayStr = new Date().toISOString().split('T')[0];
            let newStreak = stats?.current_streak || 0;
            let lastDateStr = stats?.last_played_date || null;
            
            if (localStorage.getItem('wt_last_played') !== todayStr) {
                newStreak += 1; // Увеличиваем серию
                
                if (lastDateStr) {
                    const lastD = new Date(lastDateStr); lastD.setHours(0,0,0,0);
                    const todayD = new Date(); todayD.setHours(0,0,0,0);
                    // Если разница больше 1 дня - сбрасываем серию до 1
                    if ((todayD - lastD) / 86400000 > 1) {
                        newStreak = 1;
                    }
                }
                localStorage.setItem('wt_last_played', todayStr);
                lastDateStr = todayStr;
            }
            // ---------------------------------

            let nextRoundNum = rushRound;

            if (isRoundPassed) {
                // Если раунд пройден, переносим невыученные слова в следующий раунд
                localStorage.setItem('wt_rush_carryover', JSON.stringify(activeDeck));
                nextRoundNum++;
            }

            // Обновляем базу (вместе с новой серией)
            await sb.from('user_progress').update({ 
                global_exp: gExp,
                global_level: gLvl,
                total_pairs_found: newTotalPairs,
                rush_level: nextRoundNum,
                current_streak: newStreak,         // Пишем новую серию
                last_played_date: lastDateStr      // Пишем дату
            }).eq('username', user);

            if (isRoundPassed && maxCombo >= 10) {
                sb.from('live_feed').insert({
                    username: user,
                    event_type: 'speed_combo',
                    event_val: maxCombo.toString()
                }).then(({error}) => { if(error) console.error(error); });
            }

            // Перезапускаем игру для следующего раунда / попытки
            location.reload();

        } catch(e) {
            console.error(e);
            location.reload();
        }
    }

    loadWords();
</script>
