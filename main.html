<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Mobile Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="translator.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --green: #00ff88;
            --red: #ff4b4b;
            --blue: #00bfff;
        }

        html { overflow-y: scroll; scroll-behavior: smooth; height: 100%; background: var(--bg); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            min-height: 100dvh; overflow-x: hidden; 
            padding-bottom: 90px; 
        }
        
        main { 
            width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; 
            opacity: 0; transform: translateY(15px);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
        }
        main.ready { opacity: 1; transform: translateY(0); visibility: visible; }

        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }

        /* --- TAB BAR --- */
        .tab-bar-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: linear-gradient(to top, var(--bg) 60%, transparent); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 25px; z-index: 1000; pointer-events: none; }
        .tab-bar { pointer-events: auto; width: 90%; max-width: 350px; height: 65px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.8); opacity: 0; transition: opacity 0.5s ease; }
        .tab-bar.ready { opacity: 1; }
        .tab-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #444; transition: 0.3s; flex: 1; }
        .tab-item.active { color: var(--gold); }
        .tab-icon { font-size: 18px; margin-bottom: 3px; }
        .tab-label { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .tab-item.active .tab-label { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }

        /* --- ДИЗАЙН --- */
        .brand-header { text-align: center; margin-top: 10px; margin-bottom: 25px; }
        .brand-logo { font-size: 36px; font-weight: 900; background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C, #FBF5B7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
        
        .global-info-bar { display: flex; justify-content: space-around; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; margin-bottom: 30px; backdrop-filter: blur(10px); }
        .info-item { text-align: center; }
        .info-label { display: block; font-size: 8px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 4px; }
        .info-val { font-size: 16px; font-weight: 900; color: var(--gold); }
        .info-divider { width: 1px; height: 25px; background: var(--glass-border); }

        .section-title { font-size: 10px; color: var(--gold); letter-spacing: 3px; text-align: center; margin-bottom: 15px; font-weight: 900; text-transform: uppercase; }
        .top-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 35px; }
        .top-user-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; }
        .rank-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; margin-right: 12px; }
        .rank-1 { background: linear-gradient(45deg, #BF953F, #FCF6BA); color: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .rank-2 { background: #999; color: #000; }
        .rank-3 { background: #CD7F32; color: #000; }
        .rank-other { background: rgba(255,255,255,0.05); color: #888; border: 1px solid var(--glass-border); }

        .user-info-box { flex: 1; }
        .user-info-box .name { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 2px; }
        .user-info-box .lvl { font-size: 9px; color: #888; font-weight: 700; }
        .user-info-box .lvl span.sep { color: var(--gold); margin: 0 4px; opacity: 0.5; }

        .profile-card { background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), rgba(0,0,0,0) 80%), var(--glass); border: 1px solid var(--glass-border); border-radius: 25px; padding: 25px; position: relative; overflow: hidden; backdrop-filter: blur(15px); margin-bottom: 20px; }
        .profile-header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .p-label { font-size: 10px; font-weight: 900; color: var(--gold); letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase; }
        .p-name-row { font-size: 20px; font-weight: 900; color: #fff; display: flex; justify-content: center; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; }
        .p-role { background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; font-size: 16px; text-transform: uppercase; min-height: 20px; }

        .exp-container { margin-top: 10px; text-align: left; }
        .exp-info { display: flex; justify-content: space-between; font-size: 9px; font-weight: 900; color: #aaa; margin-bottom: 8px; letter-spacing: 1px; }
        .exp-text span { color: var(--gold); font-size: 11px; margin-left: 5px; }
        .exp-count { color: var(--gold-light); }
        .exp-bar-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid var(--glass-border); overflow: hidden; }
        .exp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }

        .p-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-stat-item { border-left: 2px solid var(--gold); padding-left: 12px; }
        .p-stat-item .val { font-size: 18px; font-weight: 900; color: var(--gold-light); }
        .p-stat-item .lab { font-size: 8px; color: #555; font-weight: 800; text-transform: uppercase; }

        .ach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 30px; }
        .ach-box { aspect-ratio: 1/1; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: 0.3s; }
        .ach-emoji { font-size: 22px; margin-bottom: 4px; filter: grayscale(1); opacity: 0.2; transition: 0.3s; }
        .ach-txt { font-size: 7px; font-weight: 900; color: #444; text-transform: uppercase; transition: 0.3s; }
        
        .ach-prog { width: 70%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; display: none; }
        .ach-prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); width: 0%; transition: width 0.5s ease; }

        .ach-box.in-progress { border-color: rgba(212, 175, 55, 0.4); background: rgba(212, 175, 55, 0.05); }
        .ach-box.in-progress .ach-emoji { filter: grayscale(0.5); opacity: 0.6; }
        .ach-box.in-progress .ach-txt { color: var(--gold-light); }
        .ach-box.in-progress .ach-prog { display: block; }

        .ach-box.active { border-color: var(--green); background: rgba(0, 255, 136, 0.05); }
        .ach-box.active .ach-emoji { filter: grayscale(0); opacity: 1; }
        .ach-box.active .ach-txt { color: var(--green); }
        .ach-box.active .ach-prog { display: none; }

        .levelup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            z-index: 3000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .levelup-overlay.show { opacity: 1; pointer-events: auto; }
        
        .levelup-card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), rgba(0,0,0,0.8));
            border: 2px solid var(--gold); border-radius: 30px; padding: 40px 30px;
            text-align: center; transform: scale(0.8) translateY(30px); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4); max-width: 320px; width: 90%;
        }
        .levelup-overlay.show .levelup-card { transform: scale(1) translateY(0); }
        
        .lu-icon { font-size: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 20px var(--gold)); }
        .lu-title { font-size: 22px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .lu-title span { color: var(--gold-light); }
        .lu-desc { font-size: 11px; color: #aaa; font-weight: 700; margin-bottom: 25px; line-height: 1.5; }
        .lu-lvl-badge {
            font-size: 48px; font-weight: 900; color: #000; background: linear-gradient(45deg, var(--gold), var(--gold-light));
            width: 100px; height: 100px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 30px auto; box-shadow: 0 0 30px rgba(212, 175, 55, 0.6); border: 4px solid rgba(255,255,255,0.2);
        }
        
        .lu-btn {
            background: rgba(15,15,15,0.9); border: 1px solid var(--gold); border-radius: 20px;
            padding: 18px 40px; font-size: 14px; font-weight: 900; color: var(--gold); text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: 0.2s; width: 100%;
        }
        .lu-btn:active { background: var(--gold); color: #000; transform: scale(0.95); }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="tab-bar-container">
    <div class="tab-bar" id="tab-bar">
        <a href="javascript:void(0)" onclick="fadeNavigate('main.html')" class="tab-item active">
            <span class="tab-icon">🏠</span>
            <span class="tab-label" data-i18n="tab_home"></span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('mode.html')" class="tab-item">
            <span class="tab-icon">🎮</span>
            <span class="tab-label" data-i18n="tab_play"></span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('settings.html')" class="tab-item">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_settings"></span>
        </a>
    </div>
</div>

<main id="main-hub">
    <div class="brand-header">
        <h1 class="brand-logo">WordTime</h1>
    </div>

    <!-- ГЛОБАЛЬНАЯ СТАТИСТИКА -->
    <div class="global-info-bar">
        <div class="info-item"><span class="info-label" data-i18n="info_users"></span><span class="info-val" id="total-users-count">0</span></div>
        <div class="info-divider"></div>
        <div class="info-item"><span class="info-label" data-i18n="info_project_age"></span><span class="info-val"><span id="project-days">3</span> <span data-i18n="days_short"></span></span></div>
    </div>

    <h2 class="section-title" data-i18n="top_players_title"></h2>
    <div class="top-container" id="leaderboard-list"></div>

    <div class="profile-card">
        <div class="profile-content">
            <div class="profile-header">
                <p class="p-label" data-i18n="profile_label"></p>
                <div class="p-name-row">
                    <span id="user-name">...</span>
                    <span class="p-role-box">| <span id="user-role" class="p-role"></span></span>
                </div>
                
                <div class="exp-container">
                    <div class="exp-info">
                        <span class="exp-text"><span data-i18n="global_lvl_label"></span> <span id="global-lvl-badge">1</span></span>
                        <span class="exp-count" id="exp-count">0 / 10 EXP</span>
                    </div>
                    <div class="exp-bar-bg">
                        <div class="exp-bar-fill" id="exp-fill"></div>
                    </div>
                </div>
            </div>
            
            <div class="p-stats-grid">
                <div class="p-stat-item"><span class="val" id="user-days">0</span><span class="lab" data-i18n="stat_days"></span></div>
                <div class="p-stat-item"><span class="val" id="user-reg" style="font-size: 14px;">...</span><span class="lab" data-i18n="stat_reg"></span></div>
                <div class="p-stat-item"><span class="val" id="user-sys-role" style="font-size: 14px;">Player</span><span class="lab" data-i18n="stat_role_label"></span></div>
                <div class="p-stat-item"><span class="val" style="color: var(--green);">ACTIVE</span><span class="lab" data-i18n="stat_status"></span></div>
            </div>

            <h3 data-i18n="achievements_title" style="font-size: 9px; color: #444; letter-spacing: 2px; text-align: center; margin-top: 30px; font-weight: 900; text-transform: uppercase;"></h3>
            <div class="ach-grid" id="ach-container">
                <div class="ach-box" id="ach-5">
                    <span class="ach-emoji">🌱</span><span class="ach-txt">5 LVL</span>
                    <div class="ach-prog"><div class="ach-prog-fill" id="ach-fill-5"></div></div>
                </div>
                <div class="ach-box" id="ach-10">
                    <span class="ach-emoji">🔥</span><span class="ach-txt">10 LVL</span>
                    <div class="ach-prog"><div class="ach-prog-fill" id="ach-fill-10"></div></div>
                </div>
                <div class="ach-box" id="ach-25">
                    <span class="ach-emoji">🚀</span><span class="ach-txt">25 LVL</span>
                    <div class="ach-prog"><div class="ach-prog-fill" id="ach-fill-25"></div></div>
                </div>
                <div class="ach-box" id="ach-50">
                    <span class="ach-emoji">💎</span><span class="ach-txt">50 LVL</span>
                    <div class="ach-prog"><div class="ach-prog-fill" id="ach-fill-50"></div></div>
                </div>
                <div class="ach-box" id="ach-75">
                    <span class="ach-emoji">🏆</span><span class="ach-txt">75 LVL</span>
                    <div class="ach-prog"><div class="ach-prog-fill" id="ach-fill-75"></div></div>
                </div>
                <div class="ach-box" id="ach-100">
                    <span class="ach-emoji">👑</span><span class="ach-txt">100 LVL</span>
                    <div class="ach-prog"><div class="ach-prog-fill" id="ach-fill-100"></div></div>
                </div>
                <div class="ach-box" id="ach-150">
                    <span class="ach-emoji">🌌</span><span class="ach-txt">150 LVL</span>
                    <div class="ach-prog"><div class="ach-prog-fill" id="ach-fill-150"></div></div>
                </div>
                <div class="ach-box" id="ach-200">
                    <span class="ach-emoji">⭐</span><span class="ach-txt">200 LVL</span>
                    <div class="ach-prog"><div class="ach-prog-fill" id="ach-fill-200"></div></div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- POP-UP НОВОГО УРОВНЯ -->
<div class="levelup-overlay" id="levelup-overlay">
    <div class="levelup-card">
        <div class="lu-icon">👑</div>
        <div class="lu-title" data-i18n="lu_title"></div>
        <div class="lu-desc" data-i18n="lu_desc"></div>
        <div class="lu-lvl-badge" id="lu-new-lvl">2</div>
        <button class="lu-btn" onclick="closeLevelUp()" data-i18n="lu_btn"></button>
    </div>
</div>

<script>
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);

    const user = localStorage.getItem('wt_user');
    if(!user) window.location.href = 'index.html';

    document.getElementById('user-name').innerText = user.toUpperCase();

    function fadeNavigate(url) {
        if (window.location.href.includes(url)) return;
        const main = document.querySelector('main');
        main.style.opacity = '0';
        main.style.transform = 'translateY(15px)';
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        setTimeout(() => { window.location.href = url; }, 400); 
    }

    async function loadHubData() {
        try {
            if (!window.translations) {
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            const [profileReq, statsReq, leaderboardReq] = await Promise.all([
                sb.from('user_progress').select('*').eq('username', user).single(),
                sb.from('user_progress').select('total_pairs_found'),
                sb.from('user_progress').select('username, global_level, created_at').order('global_level', { ascending: false }).limit(3)
            ]);

            if(profileReq.data) {
                const p = profileReq.data;
                const regDate = new Date(p.created_at);
                const today = new Date();
                const diffDays = Math.max(1, Math.ceil(Math.abs(today - regDate) / (1000 * 60 * 60 * 24))); 
                
                const gLvl = p.global_level || 1;
                const gExp = p.global_exp || 0;
                const neededExp = gLvl * 10;

                const lastSeenLvl = parseInt(localStorage.getItem('wt_last_seen_lvl'));
                if (!lastSeenLvl) {
                    localStorage.setItem('wt_last_seen_lvl', gLvl);
                } else if (gLvl > lastSeenLvl) {
                    document.getElementById('lu-new-lvl').innerText = gLvl;
                    setTimeout(() => {
                        document.getElementById('levelup-overlay').classList.add('show');
                        if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 100, 50, 200]);
                    }, 600);
                    localStorage.setItem('wt_last_seen_lvl', gLvl);
                }

                document.getElementById('global-lvl-badge').innerText = gLvl;
                document.getElementById('exp-count').innerText = `${gExp} / ${neededExp} EXP`;
                document.getElementById('exp-fill').style.width = `${(gExp / neededExp) * 100}%`;

                document.getElementById('user-days').innerText = diffDays;
                
                const currentLang = localStorage.getItem('appLang') || 'rus';
                const dateLocale = currentLang === 'ukr' ? 'uk-UA' : 'ru-RU';
                document.getElementById('user-reg').innerText = regDate.toLocaleDateString(dateLocale, { day: '2-digit', month: '2-digit', year: '2-digit' });
                
                const sysRole = p.role || 'Player'; 
                const sysRoleEl = document.getElementById('user-sys-role');
                sysRoleEl.innerText = sysRole;
                
                if (sysRole === 'Admin') sysRoleEl.style.color = 'var(--red)';
                else if (sysRole === 'Tester') sysRoleEl.style.color = 'var(--blue)';
                else sysRoleEl.style.color = 'var(--gold-light)';

                updateProgressUI(gLvl); 
            }

            if(statsReq.data) {
                document.getElementById('total-users-count').innerText = statsReq.data.length;
                const projectStart = new Date('2026-04-28T00:00:00');
                const runningDays = Math.max(3, Math.ceil((new Date() - projectStart) / (1000 * 60 * 60 * 24)));
                document.getElementById('project-days').innerText = runningDays;
            }

            if(leaderboardReq.data) {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = '';
                leaderboardReq.data.forEach((u, i) => {
                    const rankClass = i < 3 ? `rank-${i+1}` : 'rank-other';
                    const uLvl = u.global_level || 1;
                    const uDays = Math.max(1, Math.ceil(Math.abs(new Date() - new Date(u.created_at)) / (1000 * 60 * 60 * 24)));
                    
                    const youSuffix = u.username.toUpperCase() === user.toUpperCase() ? ` ${window.translations['you_suffix'] || '(ВЫ)'}` : '';
                    const inGameTxt = (localStorage.getItem('appLang') || 'rus') === 'ukr' ? 'В грі:' : 'В игре:';
                    const daysTxt = window.translations['days_short'] || 'дн.';

                    list.innerHTML += `
                        <div class="top-user-card">
                            <div class="rank-circle ${rankClass}">${i+1}</div>
                            <div class="user-info-box">
                                <div class="name">${u.username.toUpperCase()}${youSuffix}</div>
                                <div class="lvl">LVL ${uLvl} <span class="sep">|</span> ${inGameTxt} ${uDays} ${daysTxt}</div>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('main-hub').classList.add('ready');
            document.getElementById('tab-bar').classList.add('ready');

        } catch (e) {
            console.error(e);
            document.getElementById('main-hub').classList.add('ready');
        }
    }

    function updateProgressUI(level) {
        const thresholds = [5, 10, 25, 50, 75, 100, 150, 200];
        let count = 0;
        let nextTargetFound = false;

        thresholds.forEach((th, i) => {
            const el = document.getElementById(`ach-${th}`);
            const fillEl = document.getElementById(`ach-fill-${th}`);
            const prevTh = i === 0 ? 0 : thresholds[i-1];

            if(el) {
                el.classList.remove('active', 'in-progress');
                if (level >= th) {
                    el.classList.add('active');
                    count = i + 1;
                } else if (!nextTargetFound) {
                    el.classList.add('in-progress');
                    nextTargetFound = true;
                    let progressPercent = ((level - prevTh) / (th - prevTh)) * 100;
                    if(fillEl) fillEl.style.width = `${Math.max(0, progressPercent)}%`;
                }
            }
        });
        
        const roleKey = `role_${count > 0 ? count - 1 : 0}`;
        document.getElementById('user-role').innerText = window.translations ? window.translations[roleKey] : "Player";
    }

    function closeLevelUp() {
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        document.getElementById('levelup-overlay').classList.remove('show');
    }

    loadHubData();
</script>
</body>
</html>
