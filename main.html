<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Главная</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="translator.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        html { overflow-y: scroll; scroll-behavior: smooth; height: 100%; background: var(--bg); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            min-height: 100dvh; overflow-x: hidden; 
            padding-bottom: 90px; 
        }
        
        main { 
            width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; 
            opacity: 0; transform: translateY(15px);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
        }
        main.ready { opacity: 1; transform: translateY(0); visibility: visible; }

        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }

        /* --- ТАБ-БАР (4 КНОПКИ) --- */
        .tab-bar-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: linear-gradient(to top, var(--bg) 60%, transparent); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 25px; z-index: 1000; pointer-events: none; }
        .tab-bar { pointer-events: auto; width: 95%; max-width: 380px; height: 65px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.8); opacity: 0; transition: opacity 0.5s ease; }
        .tab-bar.ready { opacity: 1; }
        .tab-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #444; transition: 0.3s; flex: 1; }
        .tab-item.active { color: var(--gold); }
        .tab-icon { font-size: 18px; margin-bottom: 3px; }
        .tab-label { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .tab-item.active .tab-label { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }

        /* --- ДИЗАЙН ГЛАВНОЙ --- */
        .brand-header { text-align: center; margin-top: 10px; margin-bottom: 25px; }
        .brand-logo { font-size: 36px; font-weight: 900; background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C, #FBF5B7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
        
        .global-info-bar { display: flex; justify-content: space-around; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; margin-bottom: 30px; backdrop-filter: blur(10px); }
        .info-item { text-align: center; }
        .info-label { display: block; font-size: 8px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 4px; }
        .info-val { font-size: 16px; font-weight: 900; color: var(--gold); }
        .info-divider { width: 1px; height: 25px; background: var(--glass-border); }

        .section-title { font-size: 10px; color: var(--gold); letter-spacing: 3px; text-align: center; margin-bottom: 15px; font-weight: 900; text-transform: uppercase; }
        .top-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 35px; }
        .top-user-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px 18px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; }
        .rank-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; margin-right: 12px; }
        .rank-1 { background: linear-gradient(45deg, #BF953F, #FCF6BA); color: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .rank-2 { background: #999; color: #000; }
        .rank-3 { background: #CD7F32; color: #000; }
        .rank-other { background: rgba(255,255,255,0.05); color: #888; border: 1px solid var(--glass-border); }

        .user-info-box { flex: 1; }
        .user-info-box .name { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 2px; }
        .user-info-box .lvl { font-size: 9px; color: #888; font-weight: 700; }
        .user-info-box .lvl span.sep { color: var(--gold); margin: 0 4px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="tab-bar-container">
    <div class="tab-bar" id="tab-bar">
        <a href="javascript:void(0)" onclick="fadeNavigate('main.html')" class="tab-item active">
            <span class="tab-icon">🏠</span>
            <span class="tab-label" data-i18n="tab_home">Главная</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('mode.html')" class="tab-item">
            <span class="tab-icon">🎮</span>
            <span class="tab-label" data-i18n="tab_play">Играть</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('profile.html')" class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-label" data-i18n="tab_profile">Профиль</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('settings.html')" class="tab-item">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_settings">Настройки</span>
        </a>
    </div>
</div>

<main id="main-hub">
    <div class="brand-header">
        <h1 class="brand-logo">WordTime</h1>
    </div>

    <!-- ГЛОБАЛЬНАЯ СТАТИСТИКА -->
    <div class="global-info-bar">
        <div class="info-item">
            <span class="info-label" data-i18n="info_users">ПОЛЬЗОВАТЕЛИ</span>
            <span class="info-val" id="total-users-count">0</span>
        </div>
        <div class="info-divider"></div>
        <div class="info-item">
            <span class="info-label" data-i18n="info_project_age">ДНЕЙ ПРОЕКТУ</span>
            <span class="info-val"><span id="project-days">3</span> <span data-i18n="days_short">дн.</span></span>
        </div>
    </div>

    <h2 class="section-title" data-i18n="top_players_title">ТОП ИГРОКОВ</h2>
    <div class="top-container" id="leaderboard-list">
        <!-- Список лидеров будет загружен сюда -->
    </div>
</main>

<script>
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);

    const user = localStorage.getItem('wt_user');
    if(!user) window.location.href = 'index.html';

    function fadeNavigate(url) {
        if (window.location.href.includes(url)) return;
        const main = document.querySelector('main');
        main.style.opacity = '0';
        main.style.transform = 'translateY(15px)';
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        setTimeout(() => { window.location.href = url; }, 400); 
    }

    async function loadHubData() {
        try {
            if (!window.translations) {
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            const [statsReq, leaderboardReq] = await Promise.all([
                sb.from('user_progress').select('total_pairs_found'),
                sb.from('user_progress').select('username, global_level, created_at').order('global_level', { ascending: false }).limit(5)
            ]);

            // Загрузка статистики проекта
            if(statsReq.data) {
                document.getElementById('total-users-count').innerText = statsReq.data.length;
                const projectStart = new Date('2026-04-28T00:00:00');
                const runningDays = Math.max(3, Math.ceil((new Date() - projectStart) / (1000 * 60 * 60 * 24)));
                document.getElementById('project-days').innerText = runningDays;
            }

            // Загрузка Лидерборда
            if(leaderboardReq.data) {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = '';
                leaderboardReq.data.forEach((u, i) => {
                    const rankClass = i < 3 ? `rank-${i+1}` : 'rank-other';
                    const uLvl = u.global_level || 1;
                    const uDays = Math.max(1, Math.ceil(Math.abs(new Date() - new Date(u.created_at)) / (1000 * 60 * 60 * 24)));
                    
                    const youSuffix = u.username.toUpperCase() === user.toUpperCase() ? ` ${window.translations && window.translations['you_suffix'] ? window.translations['you_suffix'] : '(ВЫ)'}` : '';
                    const inGameTxt = (localStorage.getItem('appLang') || 'rus') === 'ukr' ? 'В грі:' : 'В игре:';
                    const daysTxt = window.translations && window.translations['days_short'] ? window.translations['days_short'] : 'дн.';

                    list.innerHTML += `
                        <div class="top-user-card">
                            <div class="rank-circle ${rankClass}">${i+1}</div>
                            <div class="user-info-box">
                                <div class="name">${u.username.toUpperCase()}${youSuffix}</div>
                                <div class="lvl">LVL ${uLvl} <span class="sep">|</span> ${inGameTxt} ${uDays} ${daysTxt}</div>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('main-hub').classList.add('ready');
            document.getElementById('tab-bar').classList.add('ready');

        } catch (e) {
            console.error(e);
            document.getElementById('main-hub').classList.add('ready');
        }
    }

    // Запускаем загрузку после того как переводчик готов
    document.addEventListener('translationsReady', loadHubData);
    if (window.translations && Object.keys(window.translations).length > 0) {
        loadHubData();
    }
</script>
</body>
</html>
