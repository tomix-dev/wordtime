<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Главная</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="translator.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
	/* --- КНОПКА WORD PASS (ЗОЛОТАЯ) --- */
        .wp-banner-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(10, 10, 10, 0.9));
            border: 1px solid var(--gold);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 35px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.15), inset 0 0 15px rgba(212, 175, 55, 0.05);
            position: relative;
            overflow: hidden;
        }
        .wp-banner-link::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 60%);
            animation: rotateGlow 12s linear infinite; pointer-events: none;
        }
        .wp-banner-link:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        
        .wp-link-left { display: flex; align-items: center; gap: 15px; position: relative; z-index: 1; }
        .wp-link-icon { font-size: 32px; filter: drop-shadow(0 0 10px var(--gold)); }
        .wp-link-title { font-size: 16px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .wp-link-desc { font-size: 9px; font-weight: 800; color: var(--gold-light); text-transform: uppercase; letter-spacing: 1px; }
        .wp-link-arrow { font-size: 18px; color: var(--gold); font-weight: 900; position: relative; z-index: 1; text-shadow: 0 0 10px var(--gold); }
        :root {
            --bg: #050505;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
            --green: #00ff88;
            --blue: #00bfff;
            --purple: #b026ff;
        }

        html { overflow-y: scroll; scroll-behavior: smooth; height: 100%; background: var(--bg); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            min-height: 100dvh; overflow-x: hidden; 
            padding-bottom: 100px; 
        }
        
        main { 
            width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; 
            opacity: 0; transform: translateY(15px);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
        }
        main.ready { opacity: 1; transform: translateY(0); visibility: visible; }

        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }

        /* --- ТАБ-БАР (УЛУЧШЕННЫЙ ДИЗАЙН) --- */
        .tab-bar-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: linear-gradient(to top, var(--bg) 80%, transparent); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 25px; z-index: 1000; pointer-events: none; }
        .tab-bar { pointer-events: auto; width: 95%; max-width: 400px; height: 65px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.8); transition: opacity 0.5s ease; }
        .tab-bar.ready { opacity: 1; }
        
        .tab-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #555; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex: 1; position: relative; }
        .tab-icon { font-size: 20px; margin-bottom: 4px; transition: 0.3s; filter: grayscale(100%) opacity(0.6); transform: scale(0.9); }
        .tab-label { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        
        /* Активная вкладка */
        .tab-item.active { color: var(--gold); transform: translateY(-4px); }
        .tab-item.active .tab-icon { filter: grayscale(0%) opacity(1) drop-shadow(0 4px 6px rgba(212, 175, 55, 0.5)); transform: scale(1.15); }
        .tab-item.active .tab-label { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        .brand-header { text-align: center; margin-top: 10px; margin-bottom: 25px; }
        .brand-logo { font-size: 32px; font-weight: 900; background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C, #FBF5B7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 4px; text-transform: uppercase; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.2)); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; text-align: center; backdrop-filter: blur(10px); }
        .stat-label { display: block; font-size: 7px; color: #666; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; margin-bottom: 6px; }
        .stat-value { font-size: 18px; font-weight: 900; color: var(--gold); letter-spacing: 1px; }

        .section-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; margin-top: 10px; }
        .line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--glass-border), transparent); }
        .section-title { font-size: 10px; color: var(--gold); letter-spacing: 3px; font-weight: 900; text-transform: uppercase; white-space: nowrap; }

        /* --- ЛИДЕРБОРД --- */
        .leaderboard { display: flex; flex-direction: column; gap: 12px; margin-bottom: 35px; }
        .leader-item { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 22px; padding: 12px 18px; display: flex; align-items: center; 
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .leader-item.is-me { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
        
        .rank-box { width: 35px; height: 35px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; margin-right: 15px; flex-shrink: 0; }
        .rank-1 { background: linear-gradient(45deg, #BF953F, #FCF6BA); color: #000; }
        .rank-2 { background: #E5E4E2; color: #000; }
        .rank-3 { background: #CD7F32; color: #000; }
        .rank-default { background: rgba(255,255,255,0.05); color: #666; border: 1px solid rgba(255,255,255,0.1); }

        .leader-info { flex: 1; }
        .leader-name { font-weight: 800; font-size: 13px; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
        .leader-meta { font-size: 9px; color: #666; font-weight: 700; text-transform: uppercase; }
        .leader-meta span { color: var(--gold); margin: 0 3px; }

        .leader-lvl { background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 4px 10px; border-radius: 10px; font-weight: 900; font-size: 10px; border: 1px solid var(--glass-border); }

        .pet-mini-icon { font-size: 16px; }

        /* --- ЛЕНТА СОБЫТИЙ --- */
        .live-feed-container {
            background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 22px; padding: 15px; backdrop-filter: blur(10px);
            margin-bottom: 30px; display: flex; flex-direction: column; gap: 12px;
            max-height: 350px; overflow-y: auto;
        }
        .live-feed-container::-webkit-scrollbar { width: 4px; }
        .live-feed-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .live-feed-container::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }

        .feed-item {
            display: flex; align-items: center; gap: 12px; padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05); animation: fadeIn 0.5s ease;
        }
        .feed-item:last-child { border-bottom: none; padding-bottom: 0; }
        
        .feed-icon { 
            width: 35px; height: 35px; border-radius: 12px; display: flex; 
            align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
        }
        .feed-content { flex: 1; }
        .feed-user { font-size: 11px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
        .feed-text { font-size: 9px; color: #aaa; font-weight: 700; line-height: 1.3; }
        .feed-val { color: var(--gold-light); font-weight: 900; }
        .feed-time { font-size: 8px; color: #555; font-weight: 800; flex-shrink: 0; margin-left: 10px; }

        /* Специфичные цвета иконок */
        .icon-lvl { background: rgba(212, 175, 55, 0.1); border-color: var(--gold); }
        .icon-pet { background: rgba(176, 38, 255, 0.1); border-color: var(--purple); }
        .icon-rush { background: rgba(255, 75, 75, 0.1); border-color: var(--red); }
        .icon-brain { background: rgba(0, 191, 255, 0.1); border-color: var(--blue); }
        .icon-game { background: rgba(0, 255, 136, 0.1); border-color: var(--green); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="tab-bar-container">
    <div class="tab-bar" id="tab-bar">
        <a href="javascript:void(0)" onclick="fadeNavigate('main.html')" class="tab-item active">
            <span class="tab-icon">🏠</span>
            <span class="tab-label" data-i18n="tab_home">Главная</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('mode.html')" class="tab-item">
            <span class="tab-icon">🎮</span>
            <span class="tab-label" data-i18n="tab_play">Играть</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('profile.html')" class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-label" data-i18n="tab_profile">Профиль</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('quests.html')" class="tab-item">
            <span class="tab-icon">📜</span>
            <span class="tab-label" data-i18n="tab_quests">Квесты</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('settings.html')" class="tab-item">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_settings">Настройки</span>
        </a>
    </div>
</div>

<main id="main-hub">
    <div class="brand-header">
        <h1 class="brand-logo">WordTime</h1>
    </div>

    <!-- ГЛОБАЛЬНАЯ СТАТИСТИКА -->
    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label" data-i18n="info_users">ИГРОКОВ</span>
            <div class="stat-value" id="total-users-count">...</div>
        </div>
        <div class="stat-card">
            <span class="stat-label" data-i18n="info_project_age">В СЕТИ</span>
            <div class="stat-value" id="project-days">...</div>
        </div>
    </div>

    <!-- ТОП ИГРОКОВ -->
    <div class="section-header">
        <div class="line"></div>
        <h2 class="section-title" data-i18n="top_players_title">ЗАЛ СЛАВЫ</h2>
        <div class="line"></div>
    </div>

    <div class="leaderboard" id="leaderboard-list">
        <!-- Список лидеров -->
    </div>
<!-- БАННЕР WORD PASS -->
    <div class="wp-banner-link" onclick="fadeNavigate('wordpass.html')">
        <div class="wp-link-left">
            <div class="wp-link-icon">🏆</div>
            <div>
                <div class="wp-link-title">WORD PASS</div>
                <div class="wp-link-desc" data-i18n="wp_main_desc">Забирай награды сезона!</div>
            </div>
        </div>
        <div class="wp-link-arrow">▶</div>
    </div>
    <!-- ЛЕНТА СОБЫТИЙ -->
    <div class="section-header">
        <div class="line"></div>
        <h2 class="section-title" data-i18n="live_feed_title">ЛЕНТА СОБЫТИЙ</h2>
        <div class="line"></div>
    </div>
    
    <div class="live-feed-container" id="live-feed-list">
        <!-- События загружаются сюда -->
        <div style="text-align: center; color: #666; font-size: 10px; font-weight: 700; padding: 10px;">ЗАГРУЗКА...</div>
    </div>
</main>

<script>
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);

    const user = localStorage.getItem('wt_user');
    if(!user) window.location.href = 'index.html';

    function fadeNavigate(url) {
        if (window.location.href.includes(url)) return;
        const main = document.querySelector('main');
        main.style.opacity = '0';
        main.style.transform = 'translateY(15px)';
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        setTimeout(() => { window.location.href = url; }, 400); 
    }

    function getPetEmoji(level) {
        if (level < 10) return '🐱';
        if (level < 50) return '🐯';
        if (level < 100) return '🦁';
        if (level < 150) return '🎩';
        if (level < 200) return '🐶';
        if (level < 300) return '🐺';
        return '👑';
    }

    // Динамический перевод времени из базы
    function timeAgo(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diffInSeconds = Math.floor((now - date) / 1000);
        
        const tJustNow = window.translations?.['time_just_now'] || 'ТОЛЬКО ЧТО';
        const tMin = window.translations?.['time_min'] || 'МИН';
        const tHours = window.translations?.['time_hours'] || 'Ч';
        const tDays = window.translations?.['time_days'] || 'ДН';

        if (diffInSeconds < 60) return tJustNow;
        if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)} ${tMin}`;
        if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)} ${tHours}`;
        return `${Math.floor(diffInSeconds / 86400)} ${tDays}`;
    }

    // Динамический рендер событий из базы (замена {val} на число)
    function renderFeedItem(username, type, val, createdAt) {
        let iconHtml = '';
        let textHtml = '';

        if (type === 'lvl_up') {
            iconHtml = `<div class="feed-icon icon-lvl">⭐</div>`;
            textHtml = (window.translations?.['feed_lvl_up'] || 'Достиг <span class="feed-val">{val}</span> уровня!').replace('{val}', val);
        } else if (type === 'new_pet') {
            iconHtml = `<div class="feed-icon icon-pet">🐾</div>`;
            textHtml = (window.translations?.['feed_new_pet'] || 'Открыл питомца за <span class="feed-val">{val}</span> LVL!').replace('{val}', val);
        } else if (type === 'speed_combo') {
            iconHtml = `<div class="feed-icon icon-rush">🔥</div>`;
            textHtml = (window.translations?.['feed_speed_combo'] || 'Сделал комбо <span class="feed-val">x{val}</span> в Speed Rush!').replace('{val}', val);
        } else if (type === 'brain_exchange') {
            iconHtml = `<div class="feed-icon icon-brain">🧠</div>`;
            textHtml = (window.translations?.['feed_brain_exchange'] || 'Обменял искры на <span class="feed-val">{val} EXP</span> в Brain!').replace('{val}', val);
        } else if (type === 'pair_lvl') {
            iconHtml = `<div class="feed-icon icon-game">🎴</div>`;
            textHtml = (window.translations?.['feed_pair_lvl'] || 'Прошел <span class="feed-val">{val}</span> уровень в Найди пару!').replace('{val}', val);
        } else if (type === 'tf_lvl') {
            iconHtml = `<div class="feed-icon icon-game">⚖️</div>`;
            textHtml = (window.translations?.['feed_tf_lvl'] || 'Дошел до <span class="feed-val">{val}</span> уровня в True/False!').replace('{val}', val);
		} else if (type === 'tower') {
			iconHtml = `<div class="feed-icon icon-game">🏢</div>`;
			textHtml = (window.translations?.['feed_tower'] || 'Построил башню в <span class="feed-val">{val}</span> блоков!').replace('{val}', val);
        } else {
            return '';
        }

        return `
            <div class="feed-item">
                ${iconHtml}
                <div class="feed-content">
                    <div class="feed-user">${username}</div>
                    <div class="feed-text">${textHtml}</div>
                </div>
                <div class="feed-time">${timeAgo(createdAt)}</div>
            </div>
        `;
    }

    async function loadHubData() {
        try {
            if (!window.translations) {
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            const [statsReq, leaderboardReq, feedReq] = await Promise.all([
                sb.from('user_progress').select('*', { count: 'exact', head: true }),
                sb.from('user_progress').select('username, global_level, created_at').order('global_level', { ascending: false }).limit(5),
                sb.from('live_feed').select('*').order('created_at', { ascending: false }).limit(15)
            ]);

            // 1. Статистика проекта
            if (statsReq.count !== null) {
                document.getElementById('total-users-count').innerText = statsReq.count;
            }
            
            const projectStart = new Date('2026-04-28T00:00:00');
            const runningDays = Math.max(1, Math.ceil((new Date() - projectStart) / (1000 * 60 * 60 * 24)));
            
            const daysLabel = window.translations?.['days_short'] || 'ДН.';
            document.getElementById('project-days').innerHTML = `${runningDays} <span style="font-size: 10px; color: #888; margin-left: 2px;">${daysLabel}</span>`;

            // 2. Лидерборд
            if(leaderboardReq.data) {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = '';
                
                leaderboardReq.data.forEach((u, i) => {
                    const isMe = u.username.toLowerCase() === user.toLowerCase();
                    const rankNum = i + 1;
                    let rankClass = 'rank-default';
                    if (rankNum === 1) rankClass = 'rank-1';
                    if (rankNum === 2) rankClass = 'rank-2';
                    if (rankNum === 3) rankClass = 'rank-3';

                    const petEmoji = getPetEmoji(u.global_level || 1);
                    const uDays = Math.max(1, Math.ceil(Math.abs(new Date() - new Date(u.created_at)) / (1000 * 60 * 60 * 24)));
                    
                    const inGameTxt = window.translations?.['lb_days'] || 'ДНЕЙ:';
                    const youTxt = window.translations?.['lb_you'] || '(ВЫ)';

                    list.innerHTML += `
                        <div class="leader-item ${isMe ? 'is-me' : ''}">
                            <div class="rank-box ${rankClass}">${rankNum}</div>
                            <div class="leader-info">
                                <div class="leader-name">
                                    ${u.username.toUpperCase()} ${isMe ? `<span style="color:var(--gold); font-size:8px;">${youTxt}</span>` : ''}
                                    <span class="pet-mini-icon">${petEmoji}</span>
                                </div>
                                <div class="leader-meta">${inGameTxt} ${uDays}</div>
                            </div>
                            <div class="leader-lvl">LVL ${u.global_level || 1}</div>
                        </div>
                    `;
                });
            }

            // 3. Лента событий
            if(feedReq.data) {
                const feedList = document.getElementById('live-feed-list');
                feedList.innerHTML = '';
                
                if (feedReq.data.length === 0) {
                    const emptyTxt = window.translations?.['feed_empty'] || 'Пока нет событий...';
                    feedList.innerHTML = `<div style="text-align: center; color: #666; font-size: 10px; font-weight: 700; padding: 10px;">${emptyTxt}</div>`;
                } else {
                    feedReq.data.forEach(ev => {
                        feedList.innerHTML += renderFeedItem(ev.username, ev.event_type, ev.event_val, ev.created_at);
                    });
                }
            }

            document.getElementById('main-hub').classList.add('ready');
            document.getElementById('tab-bar').classList.add('ready');

        } catch (e) {
            console.error(e);
            document.getElementById('main-hub').classList.add('ready');
        }
    }

    document.addEventListener('translationsReady', loadHubData);
    if (window.translations && Object.keys(window.translations).length > 0) {
        loadHubData();
    }
</script>
</body>
</html>
