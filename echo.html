<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Neon Echo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="translator.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --gold: #D4AF37; --gold-light: #FFD700;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2);
            --blue: #00bfff; --green: #00ff88; --red: #ff4b4b;
        }

        html, body { overflow: hidden; height: 100%; background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(0, 255, 136, 0.05) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }

        main { 
            width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; height: 100dvh;
            display: flex; flex-direction: column; opacity: 0; transform: translateY(15px);
            transition: all 0.4s ease;
        }
        main.ready { opacity: 1; transform: translateY(0); }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ И ПЛАШКИ --- */
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; margin-top: 10px; }
        
        .header-left { display: flex; align-items: center; gap: 10px; }
        .back-btn { 
            display: inline-flex; align-items: center; gap: 8px; background: rgba(15, 15, 15, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.06); padding: 8px 14px; border-radius: 14px; 
            color: #888; font-size: 10px; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 1px; text-decoration: none; backdrop-filter: blur(10px); transition: 0.2s;
        }
        .back-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); color: #fff; }
        
        .boost-badge {
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold);
            padding: 8px 12px; border-radius: 14px; display: flex; align-items: center; gap: 4px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); backdrop-filter: blur(5px);
            font-size: 10px; font-weight: 900; color: var(--gold-light);
        }
        .boost-badge.hidden { display: none; }

        .level-badge {
            background: rgba(0, 255, 136, 0.1); border: 1px solid var(--green);
            padding: 8px 14px; border-radius: 14px; display: flex; align-items: center; gap: 6px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); backdrop-filter: blur(5px);
        }
        .level-badge span:first-child { font-size: 9px; color: var(--green); font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .level-badge span:last-child { font-size: 14px; font-weight: 900; color: #fff; }

        /* --- ПРОГРЕСС БАР --- */
        .prog-container { margin-bottom: 30px; }
        .prog-bar { width: 100%; height: 8px; background: rgba(0,0,0,0.6); border-radius: 10px; border: 1px solid var(--glass-border); overflow: hidden; }
        .prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00ffcc, var(--green)); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px var(--green); }
        .prog-fill.boosted { background: linear-gradient(90deg, var(--gold), var(--gold-light)); box-shadow: 0 0 15px var(--gold); }

        /* --- ЦЕНТРАЛЬНАЯ КНОПКА И ПЕРЕВОД --- */
        .echo-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; position: relative; }
        
        .echo-btn {
            width: 130px; height: 130px; background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(10,10,10,0.9));
            border: 2px solid var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 45px; cursor: pointer; position: relative; transition: 0.3s;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.25); z-index: 2;
        }
        .echo-btn:active { transform: scale(0.9); box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }
        .echo-btn::after {
            content: ''; position: absolute; inset: -10px; border: 1px solid var(--green); border-radius: 50%;
            opacity: 0.3; animation: pulseEcho 2s infinite; pointer-events: none;
        }
        @keyframes pulseEcho { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.4); opacity: 0; } }

        .echo-hint { font-size: 10px; font-weight: 900; color: #888; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 2; }
        
        /* Красивая плашка перевода */
        .word-translation {
            font-size: 14px; font-weight: 900; color: #fff; text-transform: uppercase; letter-spacing: 1.5px;
            opacity: 0; transform: translateY(20px); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(212, 175, 55, 0.15); border: 1px solid var(--gold); border-radius: 14px;
            padding: 10px 25px; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2); 
            margin-top: 15px; z-index: 1; text-align: center;
        }
        .word-translation.show { opacity: 1; transform: translateY(0); }
        .word-translation span { display: block; font-size: 8px; color: var(--gold); letter-spacing: 2px; margin-bottom: 4px; }

        /* --- СЕТКА ВАРИАНТОВ --- */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 120px; }
        .opt-card {
            background: rgba(20, 20, 20, 0.8); border: 1px solid var(--glass-border); border-radius: 18px;
            padding: 22px 10px; text-align: center; font-size: 14px; font-weight: 900; color: #fff;
            text-transform: uppercase; transition: 0.2s; cursor: pointer; backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .opt-card:active { transform: scale(0.95); }
        .opt-card.correct { background: rgba(0, 255, 136, 0.15); border-color: var(--green); color: var(--green); box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
        .opt-card.wrong { background: rgba(255, 75, 75, 0.15); border-color: var(--red); color: var(--red); box-shadow: 0 0 20px rgba(255, 75, 75, 0.3); }

        /* --- СТАНДАРТНЫЙ ТАБ-БАР --- */
        .tab-bar-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: linear-gradient(to top, var(--bg) 80%, transparent); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 25px; z-index: 3000; pointer-events: none; }
        .tab-bar { pointer-events: auto; width: 95%; max-width: 400px; height: 65px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.8); transition: opacity 0.5s ease; }
        .tab-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #555; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex: 1; position: relative; }
        .tab-icon { font-size: 20px; margin-bottom: 4px; transition: 0.3s; filter: grayscale(100%) opacity(0.6); transform: scale(0.9); z-index: 2; }
        .tab-label { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; z-index: 2;}
        .tab-item.active { color: var(--gold); transform: translateY(-4px); }
        .tab-item.active .tab-icon { filter: grayscale(0%) opacity(1) drop-shadow(0 4px 6px rgba(212, 175, 55, 0.5)); transform: scale(1.15); }
        .tab-item.active .tab-label { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .tab-item.active::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 45px; height: 45px; background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, transparent 70%); border-radius: 50%; z-index: 0; animation: pulseTab 2s infinite alternate; }
        
        /* --- ОВЕРЛЕИ --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.4s; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .modal-card { background: rgba(15, 15, 15, 0.95); border: 2px solid var(--green); padding: 30px 20px; border-radius: 24px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 0 40px rgba(0, 255, 136, 0.2); }
        .mod-title { font-size: 20px; font-weight: 900; color: var(--green); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; text-shadow: 0 0 15px rgba(0, 255, 136, 0.5); }
        
        /* Новая сетка правил */
        .rule-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; text-align: left; }
        .rule-item { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .rule-icon { font-size: 20px; width: 30px; text-align: center; }
        .rule-text { font-size: 10px; color: #ccc; font-weight: 700; line-height: 1.4; }
        .rule-text span { color: var(--green); font-weight: 900; }

        .mod-btn { background: linear-gradient(45deg, #00ffcc, var(--green)); border: none; padding: 15px; border-radius: 14px; color: #000; width: 100%; font-size: 11px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3); }
        .mod-btn:active { transform: scale(0.95); }
        .mod-btn-outline { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); box-shadow: none; margin-top: 10px; }

        .loader { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ЭФФЕКТ ОПЫТА */
        #floating-exp { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; font-weight: 900; color: var(--green); pointer-events: none; opacity: 0; z-index: 2500; text-shadow: 0 0 20px var(--green); }
        #floating-exp.show { animation: floatUp 1.2s ease-out forwards; }
        #floating-exp.boosted { color: var(--gold-light); text-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<main id="main-content">
    <div class="game-header">
        <div class="header-left">
            <a href="javascript:void(0)" onclick="fadeNavigate('mode.html')" class="back-btn">
                <span style="font-size: 12px;">◀</span> <span data-i18n="btn_to_modes">К РЕЖИМАМ</span>
            </a>
            <div class="boost-badge hidden" id="boost-badge">
                <span>⚡</span> <b id="boost-timer">00:00</b>
            </div>
        </div>
        <div class="level-badge">
            <span data-i18n="echo_level_title">УРОВЕНЬ</span>
            <span id="ui-level">1</span>
        </div>
    </div>

    <div class="prog-container">
        <div class="prog-bar"><div class="prog-fill" id="ui-prog-fill"></div></div>
    </div>

    <div class="echo-zone">
        <div class="echo-btn" onclick="playCurrentWord()">🔊</div>
        <div class="echo-hint" data-i18n="echo_hint">НАЖМИ, ЧТОБЫ УСЛЫШАТЬ</div>
        <div class="word-translation" id="word-translation">
            </div>
    </div>

    <div class="options-grid" id="options-grid">
        </div>
</main>

<div class="overlay show" id="start-overlay">
    <div class="modal-card">
        <div class="mod-title">NEON ECHO</div>
        
        <div class="rule-grid">
            <div class="rule-item">
                <div class="rule-icon">🔊</div>
                <div class="rule-text" data-i18n="echo_rule1">Слушай английское произношение слова.</div>
            </div>
            <div class="rule-item">
                <div class="rule-icon">👁️</div>
                <div class="rule-text" data-i18n="echo_rule2">Найди <span>УСЛЫШАННОЕ СЛОВО</span> среди карточек.</div>
            </div>
            <div class="rule-item">
                <div class="rule-icon">🎓</div>
                <div class="rule-text" data-i18n="echo_rule3">Угадай 5 слов для прохождения и получи <span>ОПЫТ</span>.</div>
            </div>
        </div>

        <div class="loader" id="start-loader" style="display: block;"></div>
        <button class="mod-btn" id="start-btn" onclick="startGame()" style="display: none;" data-i18n="btn_start_game">ПОГНАЛИ!</button>
    </div>
</div>

<div class="overlay" id="end-level-overlay">
    <div class="modal-card">
        <div class="mod-title" data-i18n="echo_level_passed">УРОВЕНЬ ПРОЙДЕН!</div>
        <div style="font-size: 40px; margin: 15px 0; text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);">🎉</div>
        <div style="color:var(--gold); font-size: 16px; font-weight: 900; margin-bottom: 25px;" id="end-exp-text">
            +5 ⭐ <span data-i18n="echo_exp_added">ОПЫТА</span>
        </div>
        <div style="display:flex; flex-direction:column;">
            <button class="mod-btn" onclick="nextLevel()" data-i18n="btn_next_level">СЛЕДУЮЩИЙ УРОВЕНЬ</button>
            <button class="mod-btn mod-btn-outline" onclick="fadeNavigate('mode.html')" data-i18n="btn_to_modes">К РЕЖИМАМ</button>
        </div>
    </div>
</div>

<div id="floating-exp">+5 EXP</div>

<div class="tab-bar-container">
    <div class="tab-bar" id="tab-bar">
        <a href="javascript:void(0)" onclick="fadeNavigate('main.html')" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span class="tab-label" data-i18n="tab_home">Главная</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('mode.html')" class="tab-item active">
            <span class="tab-icon">🎮</span>
            <span class="tab-label" data-i18n="tab_play">Играть</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('profile.html')" class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-label" data-i18n="tab_profile">Профиль</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('quests.html')" class="tab-item">
            <span class="tab-icon">📜</span>
            <span class="tab-label" data-i18n="tab_quests">Квесты</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('settings.html')" class="tab-item">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_settings">Настройки</span>
        </a>
    </div>
</div>

<script>
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);
    const user = localStorage.getItem('wt_user');
    const appLang = localStorage.getItem('appLang') || 'rus';

    let currentLevel = 1;
    let wordsPool = [];     
    let unsolvedWords = []; 
    let totalWordsToMatch = 5;
    
    let targetWordObj = null;
    let isProcessing = false;

    // Переменные для Boost
    let boostExpUntil = null;
    let isBoostActive = false;
    let boostTimerInterval = null;

    function fadeNavigate(url) {
        if (window.location.href.includes(url)) return;
        const main = document.querySelector('main');
        main.style.opacity = '0';
        main.style.transform = 'translateY(15px)';
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        setTimeout(() => { window.location.href = url; }, 400); 
    }

    async function initEcho() {
        try {
            if (!window.translations) await new Promise(r => setTimeout(r, 500));

            // 1. Грузим прогресс и бусты
            const { data: p } = await sb.from('user_progress').select('echo_level, boost_exp_until').eq('username', user).single();
            if(p) {
                currentLevel = p.echo_level || 1;
                boostExpUntil = p.boost_exp_until;
            }

            // 2. Грузим ПОЛНЫЕ слова (eng, rus, ukr)
            const { data: words } = await sb.from('words').select('id, eng, rus, ukr').eq('level', currentLevel).limit(5);
            
            if(!words || words.length < 5) {
                const { data: rnd } = await sb.from('words').select('id, eng, rus, ukr').limit(10);
                wordsPool = rnd.slice(0, 5); 
            } else {
                wordsPool = words;
            }

            unsolvedWords = [...wordsPool];
            totalWordsToMatch = unsolvedWords.length;

            updateUI();
            startBoostCheck();

            // Включаем кнопку старта
            document.getElementById('start-loader').style.display = 'none';
            document.getElementById('start-btn').style.display = 'block';
            
            document.getElementById('main-content').classList.add('ready');
        } catch(e) { console.error(e); }
    }

    function startGame() {
        document.getElementById('start-overlay').classList.remove('show');
        if(window.navigator.vibrate) window.navigator.vibrate(15);
        nextRound();
    }

    function startBoostCheck() {
        if (!boostExpUntil) return;
        checkBoost();
        if (boostTimerInterval) clearInterval(boostTimerInterval);
        boostTimerInterval = setInterval(checkBoost, 1000);
    }

    function checkBoost() {
        if (!boostExpUntil) {
            disableBoostVisuals();
            return;
        }
        const now = new Date();
        const expiry = new Date(boostExpUntil);
        if (expiry > now) {
            isBoostActive = true;
            document.getElementById('boost-badge').classList.remove('hidden');
            document.getElementById('ui-prog-fill').classList.add('boosted');
            let diffSec = Math.floor((expiry - now) / 1000);
            let m = String(Math.floor(diffSec / 60)).padStart(2, '0');
            let s = String(diffSec % 60).padStart(2, '0');
            document.getElementById('boost-timer').innerText = `${m}:${s}`;
        } else {
            disableBoostVisuals();
        }
    }

    function disableBoostVisuals() {
        isBoostActive = false;
        boostExpUntil = null;
        if(boostTimerInterval) clearInterval(boostTimerInterval);
        document.getElementById('boost-badge').classList.add('hidden');
        document.getElementById('ui-prog-fill').classList.remove('boosted');
    }

    function nextRound() {
        if(unsolvedWords.length === 0) {
            handleLevelComplete();
            return;
        }

        // Прячем старый перевод
        document.getElementById('word-translation').classList.remove('show');

        targetWordObj = unsolvedWords[Math.floor(Math.random() * unsolvedWords.length)];
        
        let options = [targetWordObj.eng];
        let distractors = wordsPool.filter(w => w.eng !== targetWordObj.eng);
        distractors.sort(() => Math.random() - 0.5);
        
        options.push(...distractors.slice(0, 3).map(w => w.eng));
        options.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        options.forEach(optText => {
            const div = document.createElement('div');
            div.className = 'opt-card';
            div.innerText = optText; // На карточках английские слова
            div.onclick = () => checkChoice(div, optText);
            grid.appendChild(div);
        });

        setTimeout(playCurrentWord, 600);
    }

    function playCurrentWord() {
        if(targetWordObj && window.speakWord) window.speakWord(targetWordObj.eng);
    }

    async function checkChoice(el, valText) {
        if(isProcessing) return;
        isProcessing = true;
        
        if(valText === targetWordObj.eng) {
            el.classList.add('correct');
            if(window.navigator.vibrate) window.navigator.vibrate(50);
            
            // Выводим красивую плашку с переводом
            const transDiv = document.getElementById('word-translation');
            const transTitle = window.translations && window.translations['echo_trans_label'] ? window.translations['echo_trans_label'] : 'ПЕРЕВОД';
            
            transDiv.innerHTML = `<span>${transTitle}</span>${targetWordObj[appLang] || targetWordObj.rus}`;
            transDiv.classList.add('show');

            unsolvedWords = unsolvedWords.filter(w => w.eng !== targetWordObj.eng);
            updateUI();

            setTimeout(() => {
                isProcessing = false;
                nextRound();
            }, 1200); 
        } else {
            el.classList.add('wrong');
            if(window.navigator.vibrate) window.navigator.vibrate([50, 100, 50]);
            
            setTimeout(() => {
                el.classList.remove('wrong');
                isProcessing = false;
                nextRound(); 
            }, 800);
        }
    }

    async function handleLevelComplete() {
        const earnedExp = isBoostActive ? 10 : 5;
        
        const expEl = document.getElementById('floating-exp');
        if (isBoostActive) expEl.classList.add('boosted');
        expEl.innerText = `+${earnedExp} EXP`;
        expEl.classList.add('show');

        if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 150]);

        const nextLvl = currentLevel + 1;
        const { data: stats } = await sb.from('user_progress').select('global_exp, global_level, wp_exp').eq('username', user).single();
        
        let gExp = (stats?.global_exp || 0) + earnedExp;
        let gLvl = stats?.global_level || 1;
        let wpExp = (stats?.wp_exp || 0) + earnedExp;

        let nextLevelExp = Math.floor(100 * Math.pow(1.15, gLvl - 1));
        while (gExp >= nextLevelExp) {
            gExp -= nextLevelExp;
            gLvl++;
            nextLevelExp = Math.floor(100 * Math.pow(1.15, gLvl - 1));
        }

        await sb.from('user_progress').update({
            echo_level: nextLvl,
            global_exp: gExp,
            global_level: gLvl,
            wp_exp: wpExp
        }).eq('username', user);

        if (nextLvl % 10 === 0) {
            await sb.from('live_feed').insert({
                username: user, event_type: 'echo_lvl', event_val: nextLvl.toString()
            });
        }

        const textExpAdd = window.translations && window.translations['echo_exp_added'] ? window.translations['echo_exp_added'] : 'ОПЫТА';
        document.getElementById('end-exp-text').innerHTML = `+${earnedExp} ⭐ <span>${textExpAdd}</span>`;
        document.getElementById('end-level-overlay').classList.add('show');
    }

    function nextLevel() {
        if(window.navigator.vibrate) window.navigator.vibrate(20);
        document.getElementById('end-level-overlay').classList.remove('show');
        location.reload(); 
    }

    function updateUI() {
        document.getElementById('ui-level').innerText = currentLevel;
        let matched = totalWordsToMatch - unsolvedWords.length;
        document.getElementById('ui-prog-fill').style.width = (matched / totalWordsToMatch * 100) + '%';
    }

    document.addEventListener('translationsReady', initEcho);
    if (window.translations && Object.keys(window.translations).length > 0) {
        initEcho();
    }
</script>

</body>
</html>
