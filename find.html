<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Game Mobile</title>
    <script src="translator.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --gold: #D4AF37; 
            --gold-light: #FFD700; 
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(212, 175, 55, 0.2); 
            --green: #00ff88; 
            --red: #ff4b4b; 
        }

        html { overflow-y: scroll; scroll-behavior: smooth; height: 100%; background: var(--bg); }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }
        
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            min-height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            padding-bottom: 90px;
            position: relative;
        }

        .bg-pattern { 
            position: fixed; inset: 0; 
            background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0); 
            background-size: 32px 32px; 
            z-index: -1; 
        }

        /* --- ТАБ-БАР (ПРЕМИУМ ДИЗАЙН С НЕОНОМ) --- */
        .tab-bar-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: linear-gradient(to top, var(--bg) 80%, transparent); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 25px; z-index: 1000; pointer-events: none; }
        .tab-bar { pointer-events: auto; width: 95%; max-width: 400px; height: 65px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.8); transition: opacity 0.5s ease; }
        .tab-bar.ready { opacity: 1; }
        
        .tab-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #555; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex: 1; position: relative; }
        .tab-icon { font-size: 20px; margin-bottom: 4px; transition: 0.3s; filter: grayscale(100%) opacity(0.6); transform: scale(0.9); z-index: 2; }
        .tab-label { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; z-index: 2; }
        
        /* Активная вкладка */
        .tab-item.active { color: var(--gold); transform: translateY(-4px); }
        .tab-item.active .tab-icon { filter: grayscale(0%) opacity(1) drop-shadow(0 4px 6px rgba(212, 175, 55, 0.5)); transform: scale(1.15); }
        .tab-item.active .tab-label { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        
        /* Неоновое свечение позади активной иконки */
        .tab-item.active::before {
            content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            width: 45px; height: 45px; background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, transparent 70%);
            border-radius: 50%; z-index: 0; animation: pulseTab 2s infinite alternate;
        }

        @keyframes pulseTab { 0% { opacity: 0.5; transform: translateX(-50%) scale(0.9); } 100% { opacity: 1; transform: translateX(-50%) scale(1.2); } }

        /* --- АНИМАЦИЯ КОНТЕНТА --- */
        main { 
            flex: 1; width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; 
            opacity: 0; transform: translateY(15px);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px; visibility: hidden; display: flex; flex-direction: column;
        }
        main.ready { opacity: 1; transform: translateY(0); visibility: visible; }

        /* --- КНОПКА НАЗАД --- */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { 
            display: inline-flex; align-items: center; gap: 5px; color: #888; 
            font-size: 10px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 1px; text-decoration: none; transition: 0.2s; cursor: pointer; 
        }
        .back-btn:active { color: var(--gold); }

        /* --- ИНДИКАТОР БУСТА --- */
        .boost-badge {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(0, 255, 136, 0.15); border: 1px solid var(--green);
            color: var(--green); font-size: 11px; font-weight: 900;
            padding: 8px 18px; border-radius: 15px; margin-bottom: 20px; align-self: center;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s; opacity: 1; transform: scale(1);
        }
        .boost-badge.hidden { opacity: 0; transform: scale(0.8); pointer-events: none; position: absolute; }
        .boost-timer { color: #fff; font-variant-numeric: tabular-nums; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        /* --- ПРОГРЕСС-БАР --- */
        .progress-section { 
            margin-bottom: 25px; background: linear-gradient(145deg, rgba(20,20,20,0.8), rgba(10,10,10,0.9)); 
            padding: 15px 20px; border-radius: 20px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .lvl-info { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 900; color: var(--gold); font-size: 11px; letter-spacing: 1px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }
        .bar-bg { height: 8px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .bar-fill { 
            height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); width: 0%; 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        .bar-fill.boosted { background: linear-gradient(90deg, var(--green), #00ffcc); box-shadow: 0 0 15px rgba(0, 255, 136, 0.5); }

        /* --- ИГРОВОЕ ПОЛЕ --- */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex: 1; align-content: start; }
        .col { display: flex; flex-direction: column; gap: 12px; }

        .card { 
            background: linear-gradient(145deg, rgba(25,25,25,0.9), rgba(15,15,15,0.95)); 
            border: 1px solid var(--glass-border); border-radius: 16px; 
            padding: 18px 8px; text-align: center; cursor: pointer; font-weight: 800; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); backdrop-filter: blur(10px); 
            font-size: clamp(12px, 3.5vw, 14px); color: #ccc; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; align-items: center; 
            justify-content: center; min-height: 65px; letter-spacing: 0.5px;
        }

        .card.selected { 
            border-color: var(--gold-light); background: rgba(212, 175, 55, 0.15); color: #fff; 
            transform: scale(0.95) translateY(2px); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3), inset 0 0 10px rgba(212, 175, 55, 0.1);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        
        .card.correct { 
            border-color: var(--green); background: rgba(0, 255, 136, 0.05); color: var(--green); 
            pointer-events: none; opacity: 0.6; transform: scale(0.98);
            box-shadow: inset 0 0 15px rgba(0, 255, 136, 0.1);
        }
        
        .card.wrong { 
            border-color: var(--red); background: rgba(255, 75, 75, 0.15); color: var(--red); 
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; 
            box-shadow: 0 0 15px rgba(255, 75, 75, 0.3);
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* --- ВСПЛЫВАЮЩИЙ ТЕКСТ ОПЫТА --- */
        .floating-exp {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 32px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.8);
            opacity: 0; pointer-events: none; z-index: 2000;
        }
        .floating-exp.boosted { color: var(--green); text-shadow: 0 0 20px rgba(0,255,136,0.8); }
        .floating-exp.show { animation: expPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes expPop {
            0% { opacity: 0; transform: translate(-50%, -30%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(1.1); }
        }
    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="tab-bar-container">
    <div class="tab-bar" id="tab-bar">
        <a href="javascript:void(0)" onclick="fadeNavigate('main.html')" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span class="tab-label" data-i18n="tab_home">Главная</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('mode.html')" class="tab-item active">
            <span class="tab-icon">🎮</span>
            <span class="tab-label" data-i18n="tab_play">Играть</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('profile.html')" class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-label" data-i18n="tab_profile">Профиль</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('quests.html')" class="tab-item">
            <span class="tab-icon">📜</span>
            <span class="tab-label" data-i18n="tab_quests">Квесты</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('settings.html')" class="tab-item">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_settings">Настройки</span>
        </a>
    </div>
</div>

<main id="main-content">
    <div class="top-header">
        <div onclick="fadeNavigate('mode.html')" class="back-btn">
            <span>◀</span> <span data-i18n="back_to_modes">НАЗАД</span>
        </div>
    </div>

    <!-- ИНДИКАТОР БУСТА X2 ОПЫТ -->
    <div class="boost-badge hidden" id="boost-badge">
        🧪 x2 ОПЫТ (<span class="boost-timer" id="boost-timer">00:00</span>)
    </div>

    <div class="progress-section">
        <div class="lvl-info">
            <span id="lvl-label">LVL ...</span>
            <span id="prog-label">0 / 5</span>
        </div>
        <div class="bar-bg"><div id="bar-fill" class="bar-fill"></div></div>
    </div>
    
    <div class="game-grid">
        <div class="col" id="eng-col"></div>
        <div class="col" id="lang-col"></div>
    </div>
</main>

<!-- Эффект начисления опыта по завершению -->
<div class="floating-exp" id="floating-exp">+5 ОПЫТ</div>

<script>
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = localStorage.getItem('wt_user');
    if (!user) window.location.href = 'index.html';

    const appLang = localStorage.getItem('appLang') || 'rus';

    let currentLevel = localStorage.getItem('wt_last_lvl') || 1;
    let matchedInLevel = localStorage.getItem('wt_last_prog') || 0;
    let pool = [], selE = null, selR = null;

    // Переменные буста
    let boostExpUntil = null;
    let isBoostActive = false;
    let boostTimerInterval = null;

    function fadeNavigate(url) {
        if (window.location.href.includes(url)) return;
        const main = document.querySelector('main');
        main.style.opacity = '0';
        main.style.transform = 'translateY(15px)';
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        setTimeout(() => { window.location.href = url; }, 400); 
    }

    async function syncData() {
        try {
            if (!window.translations) {
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            // Запрашиваем заодно и boost_exp_until
            let { data: prog } = await sb.from('user_progress').select('current_level, matched_count, boost_exp_until').eq('username', user).single();
            if(prog) {
                currentLevel = prog.current_level || 1;
                matchedInLevel = prog.matched_count || 0;
                boostExpUntil = prog.boost_exp_until;

                localStorage.setItem('wt_last_lvl', currentLevel);
                localStorage.setItem('wt_last_prog', matchedInLevel);
                
                const { data: words } = await sb.from('words')
                    .select(`id, level, eng, ${appLang}`)
                    .eq('level', currentLevel)
                    .order('id', { ascending: true })
                    .limit(5);

                if(words && words.length > 0) {
                    pool = words;
                    initBoard();
                    startBoostCheck(); // Запускаем проверку буста
                    requestAnimationFrame(() => {
                        document.getElementById('main-content').classList.add('ready');
                    });
                } else {
                    document.getElementById('eng-col').innerHTML = '<div style="color:#aaa; text-align:center; padding:20px; width:200%;">Слова закончились!</div>';
                    document.getElementById('main-content').classList.add('ready');
                }
            }
        } catch(e) {
            console.error("Ошибка при загрузке данных:", e);
        }
    }

    // --- ЛОГИКА ТАЙМЕРА БУСТА ---
    function startBoostCheck() {
        if (!boostExpUntil) return;
        
        checkBoost();
        if (boostTimerInterval) clearInterval(boostTimerInterval);
        boostTimerInterval = setInterval(checkBoost, 1000);
    }

    function checkBoost() {
        if (!boostExpUntil) {
            disableBoostVisuals();
            return;
        }

        const now = new Date();
        const expiry = new Date(boostExpUntil);

        if (expiry > now) {
            isBoostActive = true;
            document.getElementById('boost-badge').classList.remove('hidden');
            document.getElementById('bar-fill').classList.add('boosted');

            let diffSec = Math.floor((expiry - now) / 1000);
            let m = String(Math.floor(diffSec / 60)).padStart(2, '0');
            let s = String(diffSec % 60).padStart(2, '0');
            document.getElementById('boost-timer').innerText = `${m}:${s}`;
        } else {
            disableBoostVisuals();
        }
    }

    function disableBoostVisuals() {
        isBoostActive = false;
        boostExpUntil = null;
        if(boostTimerInterval) clearInterval(boostTimerInterval);
        document.getElementById('boost-badge').classList.add('hidden');
        document.getElementById('bar-fill').classList.remove('boosted');
    }

    function initBoard() {
        const eCol = document.getElementById('eng-col');
        const lCol = document.getElementById('lang-col');
        eCol.innerHTML = ''; lCol.innerHTML = '';
        
        pool.forEach(w => eCol.appendChild(createCard(w.eng, w.id, 'eng')));
        [...pool].sort(() => Math.random() - 0.5).forEach(w => lCol.appendChild(createCard(w[appLang], w.id, 'lang')));
        
        updateUI();
    }

    function createCard(text, id, type) {
        const d = document.createElement('div');
        d.className = 'card'; d.innerText = text; d.dataset.id = id;
        d.onclick = () => selectCard(d, type);
        return d;
    }

    function selectCard(d, type) {
        if(d.classList.contains('correct')) return;
        if(window.navigator.vibrate) window.navigator.vibrate(10);

        if(type === 'eng') { if(selE) selE.classList.remove('selected'); selE = d; }
        else { if(selR) selR.classList.remove('selected'); selR = d; }
        d.classList.add('selected');

        if(selE && selR) {
            const e = selE; const r = selR;
            selE = null; selR = null; 
            checkMatch(e, r);
        }
    }

    async function checkMatch(cardE, cardR) {
        if(cardE.dataset.id === cardR.dataset.id) {
            if(window.navigator.vibrate) window.navigator.vibrate(50);
            
            cardE.className = 'card correct'; 
            cardR.className = 'card correct';
            matchedInLevel++;
            localStorage.setItem('wt_last_prog', matchedInLevel);
            sb.from('user_progress').update({ matched_count: matchedInLevel }).eq('username', user);
            updateUI();
            
            if(matchedInLevel === 5) {
                // Красивое завершение уровня перед перезагрузкой
                setTimeout(handleLevelComplete, 300);
            }
        } else {
            if(window.navigator.vibrate) window.navigator.vibrate([50, 80, 50]);
            
            cardE.classList.add('wrong'); cardR.classList.add('wrong');
            setTimeout(() => { 
                cardE.classList.remove('wrong', 'selected'); 
                cardR.classList.remove('wrong', 'selected'); 
            }, 400);
        }
    }

    async function handleLevelComplete() {
        // Показываем анимацию опыта
        const expEl = document.getElementById('floating-exp');
        const earnedExp = isBoostActive ? 10 : 5;
        
        if (isBoostActive) expEl.classList.add('boosted');
        expEl.innerText = `+${earnedExp} ОПЫТ`;
        expEl.classList.add('show');
        if(window.navigator.vibrate) window.navigator.vibrate([50, 100, 150]);

        // Сохраняем прогресс
        const nextLvl = parseInt(currentLevel) + 1;
        
        let { data: stats } = await sb.from('user_progress')
            .select('total_pairs_found, global_exp, global_level, current_streak, last_played_date')
            .eq('username', user).single();
            
        let newTotal = (stats?.total_pairs_found || 0) + 5;
        
        let gExp = (stats?.global_exp || 0) + earnedExp; 
        let gLvl = stats?.global_level || 1;

        // Цикл на случай, если опыта перевалило на 2 уровня вперед
        while (gExp >= gLvl * 10) {
            gExp -= gLvl * 10;
            gLvl += 1;
        }

        // --- ДВИГАТЕЛЬ СЕРИИ (ОГОНЬКА) ---
        const todayStr = new Date().toISOString().split('T')[0];
        let newStreak = stats?.current_streak || 0;
        let lastDateStr = stats?.last_played_date || null;
        
        if (localStorage.getItem('wt_last_played') !== todayStr) {
            newStreak += 1;
            if (lastDateStr) {
                const lastD = new Date(lastDateStr); lastD.setHours(0,0,0,0);
                const todayD = new Date(); todayD.setHours(0,0,0,0);
                if ((todayD - lastD) / 86400000 > 1) newStreak = 1;
            }
            localStorage.setItem('wt_last_played', todayStr);
            lastDateStr = todayStr;
        }
        // ---------------------------------

        localStorage.setItem('wt_last_lvl', nextLvl);
        localStorage.setItem('wt_last_prog', 0);

        await sb.from('user_progress').update({ 
            current_level: nextLvl, 
            matched_count: 0,
            total_pairs_found: newTotal,
            global_exp: gExp,
            global_level: gLvl,
            current_streak: newStreak,
            last_played_date: lastDateStr
        }).eq('username', user);

        if (nextLvl % 10 === 0) {
            sb.from('live_feed').insert({
                username: user, event_type: 'pair_lvl', event_val: nextLvl.toString()
            }).then(({error}) => { if(error) console.error(error); });
        }
        
        setTimeout(() => {
            location.reload();
        }, 1200); // Даем время на анимацию
    }

    function updateUI() {
        document.getElementById('lvl-label').innerText = `LVL ${currentLevel}`;
        document.getElementById('prog-label').innerText = `${matchedInLevel} / 5`;
        document.getElementById('bar-fill').style.width = (matchedInLevel / 5 * 100) + '%';
    }

    syncData();
</script>
</body>
</html>
