<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Mobile Auth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="translator.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303; /* Глубокий OLED черный */
            --gold: #D4AF37;
            --gold-light: #FFDF73;
            --glass: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }

        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.03) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }

        /* --- КИНЕМАТОГРАФИЧНЫЙ ЭКРАН ЗАГРУЗКИ --- */
        #loading-screen {
            position: fixed; inset: 0; 
            background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; 
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.8s, transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* Плавный наезд камеры при исчезновении */
        #loading-screen.hidden { opacity: 0; visibility: hidden; transform: scale(1.05); pointer-events: none; }

        /* Мягкий свет сверху */
        .cinematic-flare {
            position: absolute; top: -30%; left: 50%; transform: translateX(-50%);
            width: 150vw; height: 100vw; max-width: 800px;
            background: radial-gradient(ellipse at center, rgba(212, 175, 55, 0.12) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        /* Премиальный логотип */
        .brand-logo-large {
            position: relative; z-index: 1;
            font-size: 32px; font-weight: 300; 
            color: #fff; letter-spacing: 12px; text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            margin-right: -12px; /* Компенсация letter-spacing для центровки */
            opacity: 0; animation: fadeUpIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.2s;
        }
        .brand-logo-large b { font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        /* Изящная линия загрузки */
        .premium-loader-container {
            position: relative; z-index: 1;
            width: 180px; height: 2px; background: rgba(255,255,255,0.1); 
            margin-top: 40px; border-radius: 2px; overflow: hidden;
            opacity: 0; animation: fadeUpIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.4s;
        }
        
        .premium-loader-bar {
            width: 0%; height: 100%; 
            background: var(--gold); 
            box-shadow: 0 0 10px var(--gold-light); 
            transition: width 0.3s ease-out;
        }

        .loader-status {
            position: relative; z-index: 1;
            margin-top: 15px; font-size: 9px; color: #666; font-weight: 600;
            letter-spacing: 4px; text-transform: uppercase;
            opacity: 0; animation: fadeUpIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.6s, pulseText 2s infinite alternate 1.6s;
        }

        @keyframes fadeUpIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseText { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- КАРТОЧКА АВТОРИЗАЦИИ (РУЧНОЙ ВХОД) --- */
        .auth-card { 
            display: none; 
            background: var(--glass); 
            padding: 40px 30px; border-radius: 28px; border: 1px solid var(--border); 
            width: 100%; max-width: 340px; text-align: center; 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
            position: relative; animation: fadeInUI 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeInUI { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .brand-logo-small { font-size: 24px; font-weight: 300; color: #fff; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 2px; }
        .brand-logo-small b { font-weight: 900; color: var(--gold); }
        .brand-tagline { font-size: 8px; color: #555; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 40px; }

        input { width: 100%; padding: 18px 20px; margin: 8px 0; border-radius: 16px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06); color: #fff; outline: none; font-family: 'Montserrat', sans-serif; font-size: 13px; transition: 0.3s; font-weight: 600; letter-spacing: 1px; }
        input::placeholder { color: #555; font-weight: 500; }
        input:focus { border-color: rgba(212, 175, 55, 0.5); background: rgba(0,0,0,0.6); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }

        .btn-gold { width: 100%; padding: 18px; margin-top: 25px; border-radius: 16px; background: #fff; color: #000; font-weight: 900; font-size: 11px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; transition: 0.2s; box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1); }
        .btn-gold:active { transform: scale(0.96); box-shadow: 0 5px 10px rgba(255, 255, 255, 0.1); }
        .auth-toggle { margin-top: 25px; font-size: 9px; color: #777; cursor: pointer; text-transform: uppercase; font-weight: 800; letter-spacing: 2px; transition: 0.2s; }
        .auth-toggle:active { color: #fff; }

        .lang-selector { display: none; margin: 20px 0 10px 0; }
        .lang-selector p { font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 12px; font-weight: 800; letter-spacing: 1px; }
        .lang-row { display: flex; gap: 10px; justify-content: center; }
        .lang-btn { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06); color: #666; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: 900; font-size: 11px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .lang-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="cinematic-flare"></div>
    <div class="brand-logo-large">Word<b>Time</b></div>
    <div class="premium-loader-container">
        <div class="premium-loader-bar" id="l-fill"></div>
    </div>
    <div class="loader-status">CONNECTING...</div>
</div>

<div class="bg-pattern"></div>

<div class="auth-card" id="login-ui">
    <div class="brand-header">
        <h1 class="brand-logo-small">Word<b>Time</b></h1>
        <p class="brand-tagline">mobile app</p>
    </div>
    
    <p id="auth-title" data-i18n="auth_login_title" style="color: var(--gold); font-size: 10px; margin-bottom: 15px; letter-spacing: 3px; font-weight: 900; text-transform: uppercase;"></p>
    
    <input type="text" id="username" placeholder="USERNAME" spellcheck="false" autocomplete="off">
    <input type="password" id="password" placeholder="PASSWORD" autocomplete="current-password">
    
    <div class="lang-selector" id="reg-lang-selector">
        <p data-i18n="auth_choose_lang">Language / Язык</p>
        <div class="lang-row">
            <button class="lang-btn" id="lang-btn-rus" onclick="changeRegLang('rus')">RU</button>
            <button class="lang-btn" id="lang-btn-ukr" onclick="changeRegLang('ukr')">UA</button>
        </div>
    </div>

    <button class="btn-gold" id="btn-main" onclick="handleAuth()" data-i18n="auth_btn_go">START</button>
    <p class="auth-toggle" onclick="toggleAuth()" id="auth-mode-text" data-i18n="auth_toggle_to_reg">NO ACCOUNT?</p>
</div>

<script>
    // Прямое подключение к Supabase
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);
    
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let isLoginMode = sessionStorage.getItem('authMode') !== 'reg';
    let inviterUsername = null;

    const startParam = tg.initDataUnsafe?.start_param;
    if (startParam && startParam.startsWith('ref_')) {
        inviterUsername = startParam.substring(4);
    }

    document.addEventListener('translationsReady', () => {
        if(window.translations) {
            document.getElementById('username').placeholder = window.translations['auth_ph_username'] || "USERNAME";
            document.getElementById('password').placeholder = window.translations['auth_ph_password'] || "PASSWORD";
        }
    });

    // Начисление рефералки напрямую в БД
    async function processReferralReward(newUsername) {
        if (!inviterUsername || inviterUsername === newUsername) return;
        try {
            const { data: inviterStats } = await sb.from('user_progress')
                .select('coins, referrals_count')
                .eq('username', inviterUsername)
                .single();

            if (inviterStats) {
                const newCoins = (inviterStats.coins || 0) + 200;
                const newRefCount = (inviterStats.referrals_count || 0) + 1;
                await sb.from('user_progress')
                    .update({ coins: newCoins, referrals_count: newRefCount })
                    .eq('username', inviterUsername);
            }
        } catch (e) { console.error("Ошибка рефералки:", e); }
    }

    window.onload = async () => {
        const fill = document.getElementById('l-fill');
        const loaderScreen = document.getElementById('loading-screen');
        const tgUser = tg.initDataUnsafe?.user;
        const savedUser = localStorage.getItem('wt_user');
        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        // Фейковая, но плавная анимация загрузки
        let prog = 0;
        const interval = setInterval(() => {
            // Замедленная имитация сложной загрузки (очень плавно)
            prog += Math.random() * 2 + 0.5; 
            if (prog > 90) prog = 90; 
            fill.style.width = prog + "%";
        }, 40);

        try {
            // ВХОД ЧЕРЕЗ TELEGRAM
            if (tgUser) {
                let { data: account } = await sb.from('user_progress').select('*').eq('tg_id', tgUser.id).maybeSingle();
                
                if (account) {
                    localStorage.setItem('wt_user', account.username);
                    localStorage.setItem('wt_login_method', 'telegram');
                } else {
                    const newName = tgUser.username || tgUser.first_name || ("User" + tgUser.id);
                    let initialCoins = inviterUsername ? 50 : 0; 

                    const { error } = await sb.from('user_progress').insert([{ 
                        username: newName, 
                        tg_id: tgUser.id, 
                        current_level: 1, 
                        matched_count: 0, 
                        total_pairs_found: 0, 
                        coins: initialCoins,
                        created_at: new Date().toISOString()
                    }]);

                    if (error) throw error;

                    localStorage.setItem('wt_user', newName);
                    localStorage.setItem('wt_login_method', 'telegram');
                    await processReferralReward(newName);
                }
                
                clearInterval(interval);
                fill.style.width = "100%";
                await wait(600); // Даем полюбоваться заполненной полоской
                
                // Плавное затухание экрана
                loaderScreen.classList.add('hidden');
                await wait(800); // Ждем окончания анимации CSS
                
                window.location.href = './main.html';

            } 
            // ВХОД ЧЕРЕЗ СОХРАНЕННЫЙ ЛОКАЛЬНО АККАУНТ
            else if (savedUser) {
                clearInterval(interval);
                fill.style.width = "100%";
                await wait(600);
                
                loaderScreen.classList.add('hidden');
                await wait(800);
                
                window.location.href = './main.html';
            } 
            // НУЖНА РУЧНАЯ АВТОРИЗАЦИЯ
            else {
                clearInterval(interval);
                fill.style.width = "100%";
                await wait(800);
                showLoginUI();
            }
        } catch (e) {
            console.error("Ошибка автовхода:", e);
            clearInterval(interval);
            showLoginUI();
        }
    };

    function showLoginUI() {
        const loader = document.getElementById('loading-screen');
        loader.classList.add('hidden');
        
        setTimeout(() => {
            document.getElementById('login-ui').style.display = 'block';
            if (!isLoginMode) applyRegUI();
        }, 500);
    }

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        sessionStorage.setItem('authMode', isLoginMode ? 'login' : 'reg');
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        
        if (isLoginMode) {
            document.getElementById('auth-title').innerText = window.translations ? window.translations['auth_login_title'] : 'LOGIN';
            document.getElementById('auth-mode-text').innerText = window.translations ? window.translations['auth_toggle_to_reg'] : 'NO ACCOUNT? REGISTER';
            document.getElementById('reg-lang-selector').style.display = 'none';
        } else {
            applyRegUI();
        }
    }

    function applyRegUI() {
        document.getElementById('auth-title').innerText = window.translations ? window.translations['auth_reg_title'] : 'REGISTER';
        document.getElementById('auth-mode-text').innerText = window.translations ? window.translations['auth_toggle_to_login'] : 'HAVE ACCOUNT? LOGIN';
        document.getElementById('reg-lang-selector').style.display = 'block';
        
        const curLang = localStorage.getItem('appLang') || 'rus';
        document.getElementById('lang-btn-rus').classList.remove('active');
        document.getElementById('lang-btn-ukr').classList.remove('active');
        const activeBtn = document.getElementById(`lang-btn-${curLang}`);
        if(activeBtn) activeBtn.classList.add('active');
    }

    function changeRegLang(lang) {
        localStorage.setItem('appLang', lang);
        location.reload();
    }

    // ПОЛНЫЙ БЛОК РУЧНОЙ АВТОРИЗАЦИИ / РЕГИСТРАЦИИ
    async function handleAuth() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        
        if(!u || !p) {
            return alert(window.translations ? window.translations['auth_err_empty'] : "Заполни все поля");
        }

        const btn = document.getElementById('btn-main');
        btn.innerText = "WAIT...";
        btn.disabled = true;

        try {
            if(isLoginMode) {
                let { data: acc } = await sb.from('user_progress').select('*').eq('username', u).single();
                if(acc && acc.password === p) {
                    localStorage.setItem('wt_user', u);
                    localStorage.setItem('wt_password', p);
                    
                    // Плавный уход в черное перед редиректом
                    document.body.style.transition = 'opacity 0.5s';
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = './main.html'; }, 500);
                } else {
                    alert(window.translations ? window.translations['auth_err_login'] : "Ошибка: неверный логин или пароль");
                    btn.innerText = window.translations ? window.translations['auth_btn_go'] : "START";
                    btn.disabled = false;
                }
            } else {
                let initialCoins = inviterUsername ? 50 : 0; 
                const { error } = await sb.from('user_progress').insert([{ 
                    username: u, 
                    password: p, 
                    current_level: 1, 
                    matched_count: 0, 
                    total_pairs_found: 0, 
                    coins: initialCoins,
                    created_at: new Date().toISOString() 
                }]);
                
                if(!error) {
                    localStorage.setItem('wt_user', u);
                    localStorage.setItem('wt_password', p);
                    await processReferralReward(u);
                    
                    document.body.style.transition = 'opacity 0.5s';
                    document.body.style.opacity = '0';
                    setTimeout(() => { window.location.href = './main.html'; }, 500);
                } else {
                    alert(window.translations ? window.translations['auth_err_taken'] : "Имя занято, попробуйте другое");
                    btn.innerText = window.translations ? window.translations['auth_btn_go'] : "START";
                    btn.disabled = false;
                }
            }
        } catch (e) {
            alert(window.translations ? window.translations['auth_err_network'] : "Ошибка сети");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
