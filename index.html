<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Mobile Auth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="translator.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }

        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.04) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }

        /* --- ПРЕМИАЛЬНЫЙ ЭКРАН ЗАГРУЗКИ --- */
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }
        
        .brand-logo-large {
            font-size: clamp(32px, 10vw, 42px); font-weight: 900; 
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C, #FBF5B7); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            letter-spacing: 5px; text-transform: uppercase;
        }

        .loading-subtitle {
            font-size: 9px; color: #666; font-weight: 800; letter-spacing: 6px; 
            text-transform: uppercase; margin-top: 15px;
            animation: pulseText 1.5s infinite alternate;
        }

        @keyframes pulseText { from { opacity: 0.5; } to { opacity: 1; } }

        .premium-loader-container {
            width: 180px; height: 2px; background: rgba(255,255,255,0.05); 
            margin-top: 30px; overflow: hidden; position: relative; border-radius: 2px;
        }
        
        .premium-loader-bar {
            width: 0%; height: 100%; background: var(--gold); 
            box-shadow: 0 0 12px var(--gold); transition: width 0.1s linear;
        }

        /* --- КАРТОЧКА АВТОРИЗАЦИИ (РУЧНОЙ ВХОД) --- */
        .auth-card { 
            display: none; 
            background: linear-gradient(145deg, rgba(15,15,15,0.9), rgba(5,5,5,0.95)); 
            padding: 40px 30px; border-radius: 24px; border: 1px solid var(--glass-border); 
            width: 100%; max-width: 340px; text-align: center; backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative; animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo-small { font-size: 26px; font-weight: 900; background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .brand-tagline { font-size: 9px; color: #666; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 35px; }

        input { width: 100%; padding: 16px; margin: 8px 0; border-radius: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); color: #fff; outline: none; font-family: 'Montserrat', sans-serif; font-size: 14px; transition: 0.3s; font-weight: 500; letter-spacing: 1px; }
        input:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .btn-gold { width: 100%; padding: 18px; margin-top: 20px; border-radius: 14px; background: linear-gradient(45deg, #BF953F, #AA771C); color: #000; font-weight: 900; font-size: 13px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2); }
        .btn-gold:active { transform: scale(0.97); }
        .auth-toggle { margin-top: 25px; font-size: 10px; color: #777; cursor: pointer; text-transform: uppercase; font-weight: 800; letter-spacing: 1.5px; transition: 0.2s; }
        .auth-toggle:active { color: #fff; }

        .lang-selector { display: none; margin: 15px 0 5px 0; }
        .lang-selector p { font-size: 9px; color: #777; text-transform: uppercase; margin-bottom: 10px; font-weight: 800; letter-spacing: 1px; }
        .lang-row { display: flex; gap: 8px; justify-content: center; }
        .lang-btn { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); color: #777; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 11px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .lang-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }
    </style>
</head>
<body>

<!-- СТИЛЬНЫЙ МИНИМАЛИСТИЧНЫЙ ЭКРАН ЗАГРУЗКИ -->
<div id="loading-screen">
    <div class="brand-logo-large">WordTime</div>
    <div class="loading-subtitle" id="load-text" data-i18n="load_connect">ПОДКЛЮЧЕНИЕ...</div>
    <div class="premium-loader-container">
        <div class="premium-loader-bar" id="l-fill"></div>
    </div>
</div>

<div class="bg-pattern"></div>

<!-- ФОРМА РУЧНОЙ АВТОРИЗАЦИИ -->
<div class="auth-card" id="login-ui">
    <div class="brand-header">
        <h1 class="brand-logo-small">WordTime</h1>
        <p class="brand-tagline">mobile app</p>
    </div>
    
    <p id="auth-title" data-i18n="auth_login_title" style="color: var(--gold); font-size: 10px; margin-bottom: 15px; letter-spacing: 3px; font-weight: 900; text-transform: uppercase;"></p>
    
    <input type="text" id="username" placeholder="USERNAME" spellcheck="false" autocomplete="off">
    <input type="password" id="password" placeholder="PASSWORD" autocomplete="current-password">
    
    <div class="lang-selector" id="reg-lang-selector">
        <p data-i18n="auth_choose_lang">Language / Язык</p>
        <div class="lang-row">
            <button class="lang-btn" id="lang-btn-rus" onclick="changeRegLang('rus')">RU</button>
            <button class="lang-btn" id="lang-btn-ukr" onclick="changeRegLang('ukr')">UA</button>
        </div>
    </div>

    <button class="btn-gold" id="btn-main" onclick="handleAuth()" data-i18n="auth_btn_go">START</button>
    <p class="auth-toggle" onclick="toggleAuth()" id="auth-mode-text" data-i18n="auth_toggle_to_reg">NO ACCOUNT?</p>
</div>

<script>
    // Прямое подключение к Supabase
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);
    
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let isLoginMode = sessionStorage.getItem('authMode') !== 'reg';
    let inviterUsername = null;

    const startParam = tg.initDataUnsafe?.start_param;
    if (startParam && startParam.startsWith('ref_')) {
        inviterUsername = startParam.substring(4);
    }

    document.addEventListener('translationsReady', () => {
        if(window.translations) {
            document.getElementById('username').placeholder = window.translations['auth_ph_username'] || "USERNAME";
            document.getElementById('password').placeholder = window.translations['auth_ph_password'] || "PASSWORD";
            document.getElementById('load-text').innerText = window.translations['load_connect'] || "ПОДКЛЮЧЕНИЕ...";
        }
    });

    // Начисление рефералки напрямую в БД
    async function processReferralReward(newUsername) {
        if (!inviterUsername || inviterUsername === newUsername) return;
        try {
            const { data: inviterStats } = await sb.from('user_progress')
                .select('coins, referrals_count')
                .eq('username', inviterUsername)
                .single();

            if (inviterStats) {
                const newCoins = (inviterStats.coins || 0) + 200;
                const newRefCount = (inviterStats.referrals_count || 0) + 1;
                await sb.from('user_progress')
                    .update({ coins: newCoins, referrals_count: newRefCount })
                    .eq('username', inviterUsername);
            }
        } catch (e) { console.error("Ошибка рефералки:", e); }
    }

    window.onload = async () => {
        const fill = document.getElementById('l-fill');
        const tgUser = tg.initDataUnsafe?.user;
        const savedUser = localStorage.getItem('wt_user');
        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        // Фейковая, но плавная анимация загрузки
        let prog = 0;
        const interval = setInterval(() => {
            prog += 2;
            if (prog > 90) prog = 90; // Виснет на 90%, пока не пройдет авторизация
            fill.style.width = prog + "%";
        }, 30);

        try {
            // ВХОД ЧЕРЕЗ TELEGRAM
            if (tgUser) {
                let { data: account } = await sb.from('user_progress').select('*').eq('tg_id', tgUser.id).maybeSingle();
                
                if (account) {
                    localStorage.setItem('wt_user', account.username);
                    localStorage.setItem('wt_login_method', 'telegram');
                } else {
                    const newName = tgUser.username || tgUser.first_name || ("User" + tgUser.id);
                    let initialCoins = inviterUsername ? 50 : 0; 

                    const { error } = await sb.from('user_progress').insert([{ 
                        username: newName, 
                        tg_id: tgUser.id, 
                        current_level: 1, 
                        matched_count: 0, 
                        total_pairs_found: 0, 
                        coins: initialCoins,
                        created_at: new Date().toISOString()
                    }]);

                    if (error) throw error;

                    localStorage.setItem('wt_user', newName);
                    localStorage.setItem('wt_login_method', 'telegram');
                    await processReferralReward(newName);
                }
                
                clearInterval(interval);
                fill.style.width = "100%";
                await wait(400); 
                window.location.href = './main.html';

            } 
            // ВХОД ЧЕРЕЗ СОХРАНЕННЫЙ ЛОКАЛЬНО АККАУНТ
            else if (savedUser) {
                clearInterval(interval);
                fill.style.width = "100%";
                await wait(400);
                window.location.href = './main.html';
            } 
            // НУЖНА РУЧНАЯ АВТОРИЗАЦИЯ
            else {
                clearInterval(interval);
                fill.style.width = "100%";
                await wait(600);
                showLoginUI();
            }
        } catch (e) {
            console.error("Ошибка автовхода:", e);
            clearInterval(interval);
            showLoginUI();
        }
    };

    function showLoginUI() {
        const loader = document.getElementById('loading-screen');
        loader.style.opacity = '0';
        loader.style.visibility = 'hidden';
        
        setTimeout(() => {
            document.getElementById('login-ui').style.display = 'block';
            if (!isLoginMode) applyRegUI();
        }, 600);
    }

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        sessionStorage.setItem('authMode', isLoginMode ? 'login' : 'reg');
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        
        if (isLoginMode) {
            document.getElementById('auth-title').innerText = window.translations ? window.translations['auth_login_title'] : 'LOGIN';
            document.getElementById('auth-mode-text').innerText = window.translations ? window.translations['auth_toggle_to_reg'] : 'REGISTER';
            document.getElementById('reg-lang-selector').style.display = 'none';
        } else {
            applyRegUI();
        }
    }

    function applyRegUI() {
        document.getElementById('auth-title').innerText = window.translations ? window.translations['auth_reg_title'] : 'REGISTER';
        document.getElementById('auth-mode-text').innerText = window.translations ? window.translations['auth_toggle_to_login'] : 'LOGIN';
        document.getElementById('reg-lang-selector').style.display = 'block';
        
        const curLang = localStorage.getItem('appLang') || 'rus';
        document.getElementById('lang-btn-rus').classList.remove('active');
        document.getElementById('lang-btn-ukr').classList.remove('active');
        const activeBtn = document.getElementById(`lang-btn-${curLang}`);
        if(activeBtn) activeBtn.classList.add('active');
    }

    function changeRegLang(lang) {
        localStorage.setItem('appLang', lang);
        location.reload();
    }

    // ПОЛНЫЙ БЛОК РУЧНОЙ АВТОРИЗАЦИИ / РЕГИСТРАЦИИ
    async function handleAuth() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        
        if(!u || !p) {
            return alert(window.translations ? window.translations['auth_err_empty'] : "Заполни все поля");
        }

        const btn = document.getElementById('btn-main');
        btn.innerText = "⏳...";
        btn.disabled = true;

        try {
            if(isLoginMode) {
                let { data: acc } = await sb.from('user_progress').select('*').eq('username', u).single();
                if(acc && acc.password === p) {
                    localStorage.setItem('wt_user', u);
                    localStorage.setItem('wt_password', p);
                    window.location.href = './main.html';
                } else {
                    alert(window.translations ? window.translations['auth_err_login'] : "Ошибка: неверный логин или пароль");
                    btn.innerText = window.translations ? window.translations['auth_btn_go'] : "START";
                    btn.disabled = false;
                }
            } else {
                let initialCoins = inviterUsername ? 50 : 0; 
                const { error } = await sb.from('user_progress').insert([{ 
                    username: u, 
                    password: p, 
                    current_level: 1, 
                    matched_count: 0, 
                    total_pairs_found: 0, 
                    coins: initialCoins,
                    created_at: new Date().toISOString() 
                }]);
                
                if(!error) {
                    localStorage.setItem('wt_user', u);
                    localStorage.setItem('wt_password', p);
                    await processReferralReward(u);
                    window.location.href = './main.html';
                } else {
                    alert(window.translations ? window.translations['auth_err_taken'] : "Имя занято, попробуйте другое");
                    btn.innerText = window.translations ? window.translations['auth_btn_go'] : "START";
                    btn.disabled = false;
                }
            }
        } catch (e) {
            alert(window.translations ? window.translations['auth_err_network'] : "Ошибка сети");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
