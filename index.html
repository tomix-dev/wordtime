<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Mobile Auth</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="translator.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; padding: 20px; }

        /* ЭКРАН ЗАГРУЗКИ */
        #loading-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .loader-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 20px; overflow: hidden; position: relative; }
        .loader-fill { height: 100%; width: 0%; background: var(--gold); box-shadow: 0 0 15px var(--gold); transition: width 0.2s linear; }

        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }

        /* КАРТОЧКА АВТОРИЗАЦИИ */
        .auth-card { 
            display: none; 
            background: rgba(10, 10, 10, 0.85); padding: 40px 30px; border-radius: 25px; border: 1px solid var(--glass-border); 
            width: 100%; max-width: 350px; text-align: center; backdrop-filter: blur(20px); box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            position: relative; animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .brand-logo { font-size: clamp(28px, 8vw, 36px); font-weight: 900; background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C, #FBF5B7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; text-transform: uppercase; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); margin-bottom: 5px; }
        .brand-tagline { font-size: 10px; color: #555; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 35px; }

        input { user-select: text; width: 100%; padding: 16px; margin: 8px 0; border-radius: 14px; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); color: #fff; outline: none; font-family: 'Montserrat', sans-serif; font-size: 16px; transition: 0.3s; -webkit-appearance: none; }
        input:focus { border-color: var(--gold); background: rgba(212, 175, 55, 0.08); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }

        .btn-gold { width: 100%; padding: 18px; margin-top: 20px; border-radius: 14px; background: linear-gradient(45deg, #BF953F, #FCF6BA, #AA771C); color: #000; font-weight: 900; font-size: 14px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2); }
        .btn-gold:active { transform: scale(0.97); opacity: 0.9; }
        .auth-toggle { margin-top: 30px; font-size: 12px; color: #666; cursor: pointer; text-decoration: none; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        /* ВЫБОР ЯЗЫКА ПРИ РЕГИСТРАЦИИ */
        .lang-selector { display: none; margin: 15px 0 5px 0; }
        .lang-selector p { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 10px; font-weight: 800; letter-spacing: 1px; }
        .lang-row { display: flex; gap: 10px; justify-content: center; }
        .lang-btn { flex: 1; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); color: #888; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 12px; transition: 0.2s; text-transform: uppercase; }
        .lang-btn.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="brand-logo">WordTime</div>
    <div class="loader-bar"><div class="loader-fill" id="l-fill"></div></div>
</div>

<div class="bg-pattern"></div>

<div class="auth-card" id="login-ui">
    <div class="brand-header">
        <h1 class="brand-logo">WordTime</h1>
        <p class="brand-tagline">powered by tomi</p>
    </div>
    
    <p id="auth-title" data-i18n="auth_login_title" style="color: var(--gold); font-size: 11px; margin-bottom: 15px; letter-spacing: 3px; font-weight: 900; text-transform: uppercase;"></p>
    
    <input type="text" id="username" placeholder="USERNAME" spellcheck="false" autocomplete="off">
    <input type="password" id="password" placeholder="PASSWORD" autocomplete="current-password">
    
    <div class="lang-selector" id="reg-lang-selector">
        <p data-i18n="auth_choose_lang"></p>
        <div class="lang-row">
            <button class="lang-btn" id="lang-btn-rus" onclick="changeRegLang('rus')">RU</button>
            <button class="lang-btn" id="lang-btn-ukr" onclick="changeRegLang('ukr')">UA</button>
        </div>
    </div>

    <button class="btn-gold" id="btn-main" onclick="handleAuth()" data-i18n="auth_btn_go"></button>
    <p class="auth-toggle" onclick="toggleAuth()" id="auth-mode-text" data-i18n="auth_toggle_to_reg"></p>
</div>

<script>
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);
    const tg = window.Telegram.WebApp;
    tg.ready();

    let isLoginMode = sessionStorage.getItem('authMode') !== 'reg';
    let inviterUsername = null;

    // Считываем реферальный параметр
    const startParam = tg.initDataUnsafe?.start_param;
    if (startParam && startParam.startsWith('ref_')) {
        inviterUsername = startParam.substring(4);
    }

    document.addEventListener('translationsReady', () => {
        if(window.translations) {
            document.getElementById('username').placeholder = window.translations['auth_ph_username'] || "USERNAME";
            document.getElementById('password').placeholder = window.translations['auth_ph_password'] || "PASSWORD";
        }
    });

    // Функция начисления реферального бонуса пригласившему
    async function processReferralReward(newUsername) {
        if (!inviterUsername || inviterUsername === newUsername) return;

        try {
            const { data: inviterStats } = await sb.from('user_progress')
                .select('coins, referrals_count')
                .eq('username', inviterUsername)
                .single();

            if (inviterStats) {
                const newCoins = (inviterStats.coins || 0) + 200;
                const newRefCount = (inviterStats.referrals_count || 0) + 1;

                await sb.from('user_progress')
                    .update({ coins: newCoins, referrals_count: newRefCount })
                    .eq('username', inviterUsername);
            }
        } catch (e) {
            console.error("Ошибка при начислении реф. бонуса:", e);
        }
    }

    window.onload = async () => {
        const fill = document.getElementById('l-fill');
        const tgUser = tg.initDataUnsafe?.user;
        const savedUser = localStorage.getItem('wt_user');

        let prog = 0;
        const interval = setInterval(() => {
            prog += 5;
            fill.style.width = prog + "%";
            if(prog >= 100) clearInterval(interval);
        }, 100);

        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        try {
            if (tgUser) {
                let { data: account } = await sb.from('user_progress').select('*').eq('tg_id', tgUser.id).maybeSingle();
                
                if (account) {
                    localStorage.setItem('wt_user', account.username);
                    localStorage.setItem('wt_login_method', 'telegram');
                } else {
                    const newName = tgUser.username || tgUser.first_name || ("User" + tgUser.id);
                    
                    // БОНУС НОВИЧКУ ПРИ АВТОРЕГИСТРАЦИИ ТЕЛЕГРАМ
                    let initialCoins = 0; 
                    if(inviterUsername) initialCoins = 50; 

                    const { error } = await sb.from('user_progress').insert([{ 
                        username: newName, 
                        tg_id: tgUser.id, 
                        current_level: 1, 
                        matched_count: 0, 
                        total_pairs_found: 0, 
                        coins: initialCoins,
                        created_at: new Date().toISOString()
                    }]);

                    // Если вдруг имя занято или ошибка базы - выкидываем на ручной ввод
                    if (error) throw error;

                    localStorage.setItem('wt_user', newName);
                    localStorage.setItem('wt_login_method', 'telegram');

                    await processReferralReward(newName);
                }
                
                await wait(1000);
                window.location.href = './main.html';

            } else if (savedUser) {
                await wait(1000);
                window.location.href = './main.html';
            } else {
                await wait(1500);
                showLoginUI();
            }
        } catch (e) {
            console.error("Ошибка автовхода:", e);
            showLoginUI();
        }
    };

    function showLoginUI() {
        const loader = document.getElementById('loading-screen');
        loader.style.opacity = '0';
        
        setTimeout(() => {
            loader.style.display = 'none';
            document.getElementById('login-ui').style.display = 'block';
            
            if (!isLoginMode) {
                applyRegUI();
            }
        }, 500);
    }

    function toggleAuth() {
        isLoginMode = !isLoginMode;
        sessionStorage.setItem('authMode', isLoginMode ? 'login' : 'reg');
        
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        
        if (isLoginMode) {
            document.getElementById('auth-title').innerText = window.translations ? window.translations['auth_login_title'] : 'Вход';
            document.getElementById('auth-mode-text').innerText = window.translations ? window.translations['auth_toggle_to_reg'] : 'Нет аккаунта? Регистрация';
            document.getElementById('reg-lang-selector').style.display = 'none';
        } else {
            applyRegUI();
        }
    }

    function applyRegUI() {
        document.getElementById('auth-title').innerText = window.translations ? window.translations['auth_reg_title'] : 'Регистрация';
        document.getElementById('auth-mode-text').innerText = window.translations ? window.translations['auth_toggle_to_login'] : 'Есть аккаунт? Войти';
        document.getElementById('reg-lang-selector').style.display = 'block';
        
        const curLang = localStorage.getItem('appLang') || 'rus';
        document.getElementById('lang-btn-rus').classList.remove('active');
        document.getElementById('lang-btn-ukr').classList.remove('active');
        const activeBtn = document.getElementById(`lang-btn-${curLang}`);
        if(activeBtn) activeBtn.classList.add('active');
    }

    function changeRegLang(lang) {
        if (typeof setLanguage === 'function') {
            setLanguage(lang);
        } else {
            localStorage.setItem('appLang', lang);
            location.reload();
        }
    }

    async function handleAuth() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        
        if(!u || !p) {
            return alert(window.translations ? window.translations['auth_err_empty'] : "Заполни все поля");
        }

        const btn = document.getElementById('btn-main');
        btn.innerText = window.translations ? window.translations['auth_btn_loading'] : "СЕКУНДУ...";
        btn.disabled = true;

        try {
            if(isLoginMode) {
                let { data: acc } = await sb.from('user_progress').select('*').eq('username', u).single();
                if(acc && acc.password === p) {
                    localStorage.setItem('wt_user', u);
                    localStorage.setItem('wt_password', p);
                    window.location.href = './main.html';
                } else {
                    alert(window.translations ? window.translations['auth_err_login'] : "Ошибка входа");
                    btn.innerText = window.translations ? window.translations['auth_btn_go'] : "Поехали";
                    btn.disabled = false;
                }
            } else {
                
                // БОНУС НОВИЧКУ ПРИ РУЧНОЙ РЕГИСТРАЦИИ
                let initialCoins = 0; 
                if(inviterUsername) initialCoins = 50; 

                const { error } = await sb.from('user_progress').insert([{ 
                    username: u, 
                    password: p, 
                    current_level: 1, 
                    matched_count: 0, 
                    total_pairs_found: 0, 
                    coins: initialCoins,
                    created_at: new Date().toISOString() 
                }]);
                
                if(!error) {
                    localStorage.setItem('wt_user', u);
                    localStorage.setItem('wt_password', p);

                    await processReferralReward(u);

                    window.location.href = './main.html';
                } else {
                    alert(window.translations ? window.translations['auth_err_taken'] : "Имя занято, попробуйте еще раз");
                    btn.innerText = window.translations ? window.translations['auth_btn_go'] : "Поехали";
                    btn.disabled = false;
                }
            }
        } catch (e) {
            alert(window.translations ? window.translations['auth_err_network'] : "Ошибка сети");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
