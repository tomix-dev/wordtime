<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordTime — Ежедневные награды</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="translator.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --gold: #D4AF37; --gold-light: #FFD700;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2);
            --green: #00ff88; --red: #ff4b4b; --purple: #b026ff; --blue: #00bfff;
        }

        html { overflow-y: scroll; scroll-behavior: smooth; height: 100%; background: var(--bg); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; 
            min-height: 100dvh; overflow-x: hidden; padding-bottom: 110px; 
        }

        main { 
            width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; 
            opacity: 0; transform: translateY(15px);
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            visibility: hidden;
        }
        main.ready { opacity: 1; transform: translateY(0); visibility: visible; }

        .bg-pattern { position: fixed; inset: 0; background-image: radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.05) 1px, transparent 0); background-size: 32px 32px; z-index: -1; }

        /* --- ТАБ-БАР --- */
        .tab-bar-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 110px; background: linear-gradient(to top, var(--bg) 80%, transparent); display: flex; justify-content: center; align-items: flex-end; padding-bottom: 25px; z-index: 1000; pointer-events: none; }
        .tab-bar { pointer-events: auto; width: 95%; max-width: 400px; height: 65px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.8); }
        .tab-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #555; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); flex: 1; position: relative; }
        .tab-icon { font-size: 20px; margin-bottom: 4px; transition: 0.3s; filter: grayscale(100%) opacity(0.6); transform: scale(0.9); z-index: 2; }
        .tab-label { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; z-index: 2; }
        
        .tab-item.active { color: var(--gold); transform: translateY(-4px); }
        .tab-item.active .tab-icon { filter: grayscale(0%) opacity(1) drop-shadow(0 4px 6px rgba(212, 175, 55, 0.5)); transform: scale(1.15); }
        .tab-item.active .tab-label { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .tab-item.active::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 45px; height: 45px; background: radial-gradient(circle, rgba(212, 175, 55, 0.25) 0%, transparent 70%); border-radius: 50%; z-index: 0; animation: pulseTab 2s infinite alternate; }

        @keyframes pulseTab { 0% { opacity: 0.5; transform: translateX(-50%) scale(0.9); } 100% { opacity: 1; transform: translateX(-50%) scale(1.2); } }

        /* --- ШАПКА --- */
        .top-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .back-btn { 
            display: inline-flex; align-items: center; gap: 6px; 
            background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 8px 14px; border-radius: 14px; color: #aaa; 
            font-size: 10px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 1px; text-decoration: none; transition: 0.3s; 
            cursor: pointer; backdrop-filter: blur(10px);
        }
        .back-btn:active { transform: scale(0.95); background: rgba(212, 175, 55, 0.1); color: #fff; border-color: var(--gold); }
        
        .header-title { text-align: center; margin-bottom: 30px; }
        .page-title { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .page-desc { font-size: 10px; color: var(--gold); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        /* --- СЕТКА КАЛЕНДАРЯ --- */
        .calendar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding-bottom: 20px; }
        
        .day-card {
            background: linear-gradient(145deg, rgba(25,25,25,0.7), rgba(10,10,10,0.9));
            border: 1px solid var(--glass-border); border-radius: 18px;
            padding: 15px 5px; text-align: center; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            min-height: 115px; box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 0 10px rgba(255,255,255,0.02); transition: 0.3s;
        }

        .day-num { font-size: 10px; font-weight: 900; color: #777; margin-bottom: 8px; letter-spacing: 1px; }
        .day-icon { font-size: 28px; margin-bottom: 8px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); transition: 0.3s; }
        .day-reward { font-size: 9px; font-weight: 900; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.3s; }

        /* Состояния ячеек */
        .day-card.missed { border-color: #222; opacity: 0.5; pointer-events: none; filter: grayscale(1); background: rgba(10,10,10,0.8); }
        .day-card.missed .day-reward { color: var(--red); }
        
        .day-card.claimed { border-color: var(--green); background: rgba(0, 255, 136, 0.05); pointer-events: none; box-shadow: inset 0 0 15px rgba(0, 255, 136, 0.05); }
        .day-card.claimed .day-num { color: var(--green); }
        .day-card.claimed .day-icon { filter: grayscale(0) drop-shadow(0 0 10px var(--green)); opacity: 0.4; }
        .day-card.claimed .day-reward { color: var(--green); }
        
        .day-card.locked { opacity: 0.8; pointer-events: none; }
        .day-card.locked .day-icon { filter: grayscale(1) opacity(0.5); }

        /* СЕГОДНЯ */
        .day-card.today { 
            border-color: var(--gold-light); background: rgba(212, 175, 55, 0.12); 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.1); cursor: pointer;
            transform: scale(1.05); z-index: 10; animation: pulseToday 2s infinite;
        }
        .day-card.today .day-num { color: #fff; text-shadow: 0 0 10px var(--gold); }
        .day-card.today .day-icon { filter: drop-shadow(0 0 15px var(--gold)); transform: scale(1.2); margin-bottom: 12px; }
        .day-card.today .day-reward { background: linear-gradient(45deg, var(--gold), var(--gold-light)); color: #000; padding: 5px 12px; border-radius: 10px; box-shadow: 0 5px 10px rgba(212,175,55,0.4); letter-spacing: 1px; }
        .day-card.today:active { transform: scale(0.95); }

        /* Выделение кейсов */
        .day-card.case-day .day-icon { font-size: 34px; }
        .day-card.case-day.locked .day-reward { color: var(--blue); }

        @keyframes pulseToday { 0%, 100% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); } 50% { box-shadow: 0 0 35px rgba(212, 175, 55, 0.5); } }

        /* --- ОВЕРЛЕЙ ПОЛУЧЕНИЯ НАГРАДЫ --- */
        .reward-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
            z-index: 3000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .reward-overlay.show { opacity: 1; pointer-events: auto; }
        .reward-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.95), rgba(10,10,10,1)); border: 2px solid var(--gold);
            border-radius: 25px; padding: 40px 30px; text-align: center; width: 85%; max-width: 350px;
            transform: scale(0.8); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 50px rgba(212, 175, 55, 0.4);
        }
        .reward-overlay.show .reward-card { transform: scale(1); }
        
        .r-icon { font-size: 75px; margin-bottom: 15px; animation: popIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; filter: drop-shadow(0 0 25px rgba(255,255,255,0.2)); }
        .r-title { font-size: 20px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .r-amount { font-size: 32px; font-weight: 900; color: var(--gold); margin-bottom: 30px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
        
        .r-btn {
            background: linear-gradient(45deg, var(--gold), var(--gold-light)); border: none;
            color: #000; font-size: 13px; font-weight: 900; padding: 16px 35px; border-radius: 16px;
            width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.2s; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }
        .r-btn:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(212, 175, 55, 0.4); }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="tab-bar-container">
    <div class="tab-bar" id="tab-bar">
        <a href="javascript:void(0)" onclick="fadeNavigate('main.html')" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span class="tab-label" data-i18n="tab_home">Главная</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('mode.html')" class="tab-item">
            <span class="tab-icon">🎮</span>
            <span class="tab-label" data-i18n="tab_play">Играть</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('profile.html')" class="tab-item active">
            <span class="tab-icon">👤</span>
            <span class="tab-label" data-i18n="tab_profile">Профиль</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('quests.html')" class="tab-item">
            <span class="tab-icon">📜</span>
            <span class="tab-label" data-i18n="tab_quests">Квесты</span>
        </a>
        <a href="javascript:void(0)" onclick="fadeNavigate('settings.html')" class="tab-item">
            <span class="tab-icon">⚙️</span>
            <span class="tab-label" data-i18n="tab_settings">Настройки</span>
        </a>
    </div>
</div>

<main id="main-content">
    <div class="top-header">
        <div onclick="fadeNavigate('profile.html')" class="back-btn">
            <span style="font-size: 12px;">◀</span> <span data-i18n="back_to_profile">К ПРОФИЛЮ</span>
        </div>
    </div>

    <div class="header-title">
        <div class="page-title" data-i18n="calendar_title">ЕЖЕДНЕВНЫЕ НАГРАДЫ</div>
        <div class="page-desc" data-i18n="calendar_desc">Забирай призы каждый день!</div>
    </div>

    <div class="calendar-grid" id="calendar-grid">
        <!-- Генерируется через JS -->
    </div>
</main>

<div class="reward-overlay" id="reward-overlay">
    <div class="reward-card">
        <div class="r-icon" id="r-icon">🎁</div>
        <div class="r-title" id="r-title">НАГРАДА</div>
        <div class="r-amount" id="r-amount">+100</div>
        <button class="r-btn" onclick="closeReward()" data-i18n="btn_claim">ОТЛИЧНО</button>
    </div>
</div>

<script>
    const S_URL = 'https://byyscovhwjmjbjooqolc.supabase.co';
    const S_KEY = 'sb_publishable_5PFScQhSqxyMNKWUlMDdGw_34Mozf1j';
    const sb = supabase.createClient(S_URL, S_KEY);

    const user = localStorage.getItem('wt_user');
    if (!user) window.location.href = 'index.html';

    let dbData = null;
    let daysInMonth = 0;
    let currentDay = 0;
    let isProcessing = false;

    function fadeNavigate(url) {
        if (window.location.href.includes(url)) return;
        const main = document.querySelector('main');
        main.style.opacity = '0';
        main.style.transform = 'translateY(15px)';
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        setTimeout(() => { window.location.href = url; }, 400); 
    }

    async function initCalendar() {
        try {
            if (!window.translations) await new Promise(res => setTimeout(res, 500));

            // Клиент генерирует сетку на основе своего времени (только для визуала)
            const now = new Date();
            currentDay = now.getDate();
            daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            let { data, error } = await sb.from('user_progress').select('*').eq('username', user).single();
            if (error) throw error;
            dbData = data;

            renderGrid();
            document.getElementById('main-content').classList.add('ready');

        } catch (e) {
            console.error("Ошибка загрузки календаря:", e);
        }
    }

    function getDayConfig(day) {
        if (day === 7) return { type: 'case_normal', icon: '📦', nameKey: 'case_normal', isCase: true };
        if (day === 14) return { type: 'case_stylish', icon: '🧰', nameKey: 'case_stylish', isCase: true };
        if (day === 21) return { type: 'case_stylish', icon: '🧰', nameKey: 'case_stylish', isCase: true };
        if (day === 28 || day === 30 || day === 31) return { type: 'case_premium', icon: '💎', nameKey: 'case_premium', isCase: true };

        const rot = day % 3;
        if (rot === 1) return { type: 'exp', icon: '⭐', nameKey: 'reward_exp', isCase: false };
        if (rot === 2) return { type: 'time', icon: '⏳', nameKey: 'reward_time', isCase: false };
        return { type: 'sparks', icon: '🧠', nameKey: 'reward_sparks', isCase: false };
    }

    function renderGrid() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const claimedDays = dbData.calendar_claimed || [];

        const txtDay = window.translations?.['day_word'] || 'ДЕНЬ';
        const txtClaim = window.translations?.['btn_claim'] || 'ЗАБРАТЬ';
        const txtClaimed = window.translations?.['status_claimed'] || 'ПОЛУЧЕНО';
        const txtMissed = window.translations?.['status_missed'] || 'ПРОПУЩЕНО';
        
        for (let i = 1; i <= daysInMonth; i++) {
            const conf = getDayConfig(i);
            const rewardName = window.translations?.[conf.nameKey] || conf.nameKey;
            let statusClass = '';
            let btnText = rewardName;

            const isClaimed = claimedDays.includes(i);

            if (i < currentDay) {
                if (isClaimed) {
                    statusClass = 'claimed'; btnText = txtClaimed;
                } else {
                    statusClass = 'missed'; btnText = txtMissed;
                }
            } else if (i === currentDay) {
                if (isClaimed) {
                    statusClass = 'claimed'; btnText = txtClaimed;
                } else {
                    statusClass = 'today'; btnText = txtClaim;
                }
            } else {
                statusClass = 'locked'; btnText = rewardName;
            }

            let extraClass = conf.isCase ? 'case-day' : '';
            // Передаем только id дня, всё остальное сервер сделает сам
            let onClick = (statusClass === 'today') ? `onclick="claimToday(${i})"` : '';

            let html = `
                <div class="day-card ${statusClass} ${extraClass}" id="day-${i}" ${onClick}>
                    <div class="day-num">${txtDay} ${i}</div>
                    <div class="day-icon">${conf.icon}</div>
                    <div class="day-reward">${btnText}</div>
                </div>
            `;
            grid.innerHTML += html;
        }
    }

    // 🛡️ СБОР НАГРАДЫ ЧЕРЕЗ СЕРВЕР
    async function claimToday(day) {
        if(isProcessing) return;
        isProcessing = true;
        if(window.navigator.vibrate) window.navigator.vibrate([50, 100, 50]);

        const card = document.getElementById(`day-${day}`);
        card.style.pointerEvents = 'none';
        card.querySelector('.day-reward').innerText = '...';

        try {
            // Обращаемся к серверу. Он сам знает, какой сегодня день по UTC
            const res = await fetch('https://byyscovhwjmjbjooqolc.supabase.co/functions/v1/claim-calendar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user }) 
            });

            const data = await res.json();

            if (data.error) {
                alert("Ошибка: " + data.error);
                card.style.pointerEvents = 'auto';
                card.querySelector('.day-reward').innerText = 'ОШИБКА';
                isProcessing = false;
                return;
            }

            // Синхронизируем базу данных на клиенте с ответом сервера
            dbData = { ...dbData, ...data.updatedData };
            
            let finalTitle = '';
            let amountStr = '';
            let rIcon = '🎁';

            // Отрисовка результатов, которые прислал сервер
            if (data.rewardType.startsWith('case_')) {
                let caseType = data.rewardType.split('_')[1]; 
                finalTitle = window.translations?.[`case_${caseType}`] || data.rewardType;
                amountStr = '+1 В ИНВЕНТАРЬ';
                rIcon = data.rewardType === 'case_premium' ? '💎' : (data.rewardType === 'case_normal' ? '📦' : '🧰');
            } else {
                amountStr = `+${data.amount}`;
                if (data.rewardType === 'exp') {
                    finalTitle = window.translations?.['reward_exp'] || 'ОПЫТ';
                    rIcon = '⭐';
                } else if (data.rewardType === 'time') {
                    finalTitle = window.translations?.['reward_time'] || 'TIME';
                    rIcon = '⏳';
                } else if (data.rewardType === 'sparks') {
                    // Искры сохраняем локально, как обычно
                    let locSparks = parseInt(localStorage.getItem('wt_sparks')) || 0;
                    localStorage.setItem('wt_sparks', locSparks + data.amount);
                    finalTitle = window.translations?.['reward_sparks'] || 'ИСКРЫ';
                    rIcon = '🧠';
                }
            }

            document.getElementById('r-icon').innerText = rIcon;
            document.getElementById('r-title').innerText = finalTitle;
            document.getElementById('r-amount').innerText = amountStr;
            
            document.getElementById('reward-overlay').classList.add('show');
            renderGrid(); // Перерисовываем календарь, чтобы день стал "ПОЛУЧЕНО"

        } catch(e) {
            console.error("Ошибка при получении награды:", e);
            card.style.pointerEvents = 'auto';
            card.querySelector('.day-reward').innerText = 'ОШИБКА';
        }
        isProcessing = false;
    }

    function closeReward() {
        if(window.navigator.vibrate) window.navigator.vibrate(10);
        document.getElementById('reward-overlay').classList.remove('show');
    }

    document.addEventListener('translationsReady', initCalendar);
    if (window.translations && Object.keys(window.translations).length > 0) {
        initCalendar();
    }
</script>
</body>
</html>
